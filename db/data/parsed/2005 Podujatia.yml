year: 2005
year_description: |-
  ROK 2005
                                     (30. rok existencie)

         Rok 2005 bol najdramatickejším rokom v histórii TD Bralen hneď z niekoľkých
  dôvodov:
         1/    bol prvým rokom, v ktorom generálny sponzor a.s. Slovnaft nepodporil TD
  Bralen
         2/    bol jubilejným rokom jeho 30 ročnej existencie
         3/    oslavy 30 výročia v júni 2005 boli formálnym i logickým ukončením 30 ročnej
  činnosti súboru a súčasne začiatkom existencie TD Bralen v novej ekonomickej,
  organizačnej a systémovej štruktúre.

          Súboru bol v januári 2005 umožnený návrat do zrekonštruovaných priestorov
  v Apollo klube Slovnaft, avšak 7 mesačná práca v dočasných priestoroch na SOU-ch
  Slovnaft spôsobila úbytok členskej základne, stratu repertoáru, znížený počet predstavení
  a tým silnú demotiváciu tých, čo zostali. Návrat do Apolky bol podmienený i platením
  nájomného a energií, ktoré boli zvýšené o cca 700%. Do konca roku 2004 bolo nájomné a
  energie poskytované generálnym sponzorom a.s. Slovnaft za sponzorované ceny.
  Slovnaft nielen že zvýšil nájomné, ale i zrušil všetky finančné dotácie v prospech súboru.
          Strata podpory generálneho sponzora mala dopad na všetky súborové činnosti. A
  to práve v roku, v ktorom oslavy 30. výročia vyžadovali zvýšené ekonomické, managerské
  a umelecké úsilie.
          Napriek všetkým týmto faktom sme sa rozhodli, že sa pokúsime o čo
  najdôstojnejšie ukončenie jubilejnej sezóny. Vypracovali sme projekt „30. výročie TD
  Bralen“, ktorý pozostával z:
          -      uvedenia nového premiérového programu v SND
          -      uvedenia galaprogramu v SND
          -      uvedenia retrospektívneho programu v DK Zrkadlový háj
          -      uvedenia slávnostnej Akadémie v DK Zrkadlový háj
          -      podporných reklamných a propagačných podujatí (bildboardy, programové
  bulletiny, fotografická výstava, faktografická výstava, mediálna kampaň)
          Všetky tieto aktivity vyvrcholili v júni 2005 a to: 11. a 18. 6. v Dome kultúry
  Zrkadlový háj a 26. 6. v Slovenskom národnom divadle.
          Úspech a spoločenský dopad osláv výročia spôsobil, že sa nám podarilo
  zaktivizovať doterajších sponzorov a dokonca nájsť i nových. Pre 31. sezónu sme
  pripravili novú koncepciu.
  1/ ekonomickú :
          -      zefektívnenie interných zdrojov
          -      intenzívne vyhľadávanie darcov 2%
          -      realizácia komerčných predstavení
          -      hladanie nových sponzorov
          -      realizácia kurzovnej činnosti (Letné školy tanca, tréningy pre verejnosť-
                 tanečné, Pilates)

  2/ organizačnú:
         -     zefektívnenie pedagogického procesu (výchova interných pedagógov a
  choreografov)
         -     spolupráca s ďaľšími tanečnými súbormi a inštitúciami (Detské baletné
  štúdio, Charlie´s club, Základná umelecká škola Štefánikova, Katedra tanečnej tvorby
  Vysokej školy múzických umení)
         -     zintenzívnenie kontaktov s bývalými členmi súboru


  3.1. 2005       Prvé tréningy v Bralene, AKS
                  Návrat po 7 mesiacoch do zrekonštruovaných priestorov avšak za
  komerčných podmienok, bez sponzoringu od Slovnaftu

  1.-6.3. 2005                Sústredenie, “Šibeničky”, AKS
                              Petr Zuska, šéf baletu ND Praha ,nám na základe priateľstva
  bezplatne poskytol svoju choreografiu “Šibeničky. Uvoľnil aj tanečníka baletu ND, Radka
  Vrátila, ktorý s nami túto choreografiu naštudoval. Radek pre urýchlenie naštudovania
  pracoval len s jedným obsadením: A. Kotulová - P. Kovalčík, J. Špoták - P- Černová, Z.
  Sehnalová - S. Stanek. Túto choreografiu sme však nikdy neuviedli, lebo J. Špoták s P.
  Černovou odišli tesne pred premiérou k J. Ďurovčíkovi

  18.6. 2005                 30 rokov TD Bralen, DK ZH, Bratislava
                             Slávnostný spomienkový program TD Bralen k jeho 30. výročiu.
  Prvá polovica programu bola venovaná minulosti a tancovaná bývalými členmi Bralenu
