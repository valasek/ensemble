year_description: |-
  ROK 1977
                                          (2. rok existencie)

  Najdôležitejšie podujatia tohto roku:

  2.4. 1977            II. Večer moderného tanca, ZK ROH Vernosť, Bratislava
                       Účinkujúci: VUS UK, Praha - hosť, Bralen a Re ex -
  spoluorganizátori.

  25.6.-6.7. 1977      Letný tanečný kurz v Palucca Schule, Drážďany, NDR
                       Toto podujatie bolo veľmi významné z histórie Bralenu, pretože toto
  bol prvý tanečný kurz v zahraničí, ktorého sa zúčastnili interní pedagógovia súboru, Oľga
  Potfajová-Letenajová a Dagmar Kováčiková-Puobišová. Význam tohto podujatia je zo
  strany pedagógov, pre ktorých to malo veľký stimul, zdokonalili sa v technikách jazzového
  tanca, klasického tanca, rytmiky i nemeckého výrazového tanca ešte pod vedením
  samotnej Gret Paluccy.




