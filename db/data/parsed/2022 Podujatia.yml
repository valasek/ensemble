  description: |-
    K záveru roka sme sa opäť tradične stretli pri vianočnom stromčeku v
    priestoroch našej tanečnej sály. Zhodnotili sme si uplynulý rok a predstavili najbližšie
    plány (práca na novej choreografii s B. Šoganovou, zájazd do Otrokovíc, plánované
    predstavenie na jar). Členovia súboru tiež odsúhlasili plán na aktualizáciu stanov TD
    Bralen, na ich celkové zjednodušenie a zahrnutie umeleckého šéfa ako štatutára
    organizácie.
