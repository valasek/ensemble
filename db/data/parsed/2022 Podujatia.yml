- date_from: '2022-04-07'
  date_to:
  raw_header: Súbor TDB
  name: Súbor TDB
  location:
  description: "S. Zajícová mi písala svoj postreh po predstavení, ktorý ma zahrial
    pri\nsrdiečku: \"Ahoj, keďže som už nebola na zdieľacom krúžku po predstavení.
    Tak ti k tomu\nchcem ešte niečo napísať. Veľmi ma teší čím je Bralen teraz a kam
    si ho dostal ako\n“umelecký šéf\" (\U0001F609 ). Mala som príležitosť byť súčasťou
    súboru, odkedy si ho prevzal a\nmusím povedať že vidím obrovský progres v tom
    ako vedieš tréningy, súbor a aj v tom\naká je všeobecná atmosféra v súbore. Veľmi
    obdivujem ako si to všetko zvládol a myslím\nze môžeš byť na seba veľmi hrdý.
    Podarilo sa ti obnoviť skvelý súbor, a hlavne podarilo sa\nti vytvoriť v ňom asi
    najpriateľskejšiu atmosféru aká kedy bola v Bralene ❤\nA z toho som tak všeobecne
    hrdá aj na nás všetkých Braleňákov, akí skvelí, milí a\npriateľskí tu sú. Na to,
    ako je v bralene vždy dôležitá spolupráca, a ľudia si navzájom\n\npomáhajú, nezávidia
    si. Som hrdá na to že to nie je len o tanci ale aj o emóciách a o tom\nsrdiečku
    ktoré vkladáme do tanca. To robí Bralen Bralenom\U0001F60A \U0001F60A \U0001F970
    \""
