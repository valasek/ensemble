  name: Súbor TDB
  location:
  description: |-
    Pokúsili sme sa o zrealizovanie predstavenia ku koncu sezóny, v
    týždni 13.-19. júna. Na poslednú chviľu sme zvažovali spraviť predstavenie ku koncu
    sezóny, do úvahy prichádzali DK Zrkadlový háj, DK Dúbravka, DK Ružinov, SĽUK. Ceny
    prenájmov sa pre in áciu a rast cien energií v dôsledku aktuálneho vojenského kon iktu
    na Ukrajine výrazne zvyšovali. Prenájmy vychádzajú draho a pravdepodobne by sa nám

         nepodarilo ani z polovice naplniť hľadisko. Spravili sme si aspoň lepší prehľad o cenách
         prenájmu, realizáciu sme sa ale rozhodli odložiť na iný termín.
