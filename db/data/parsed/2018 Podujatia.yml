year: 2018
year_description: |-
  ROK 2018
                                       (43. rok existencie)

  Najdôležitejšie podujatia tohto roku:

  8.1. 2018            Za iatok roka - prvé tréningy, AKS
                       Za iatok roka sa niesol v znamení odchodu po etnej skupiny udí:
  Anna Vašková (8.1.), Veronika Špotáková (8.1.), Kristína aplová (15.1.), Silvia Grachová
  (15.1.), Petra Párnická (15.1.), Zuzana Ma icová (16.1.), Dominika Fiedlerová (31.1. -
  zdravotné dôvody), Dominika Malenovská (9.2.) - vä šina lenov odišla so zámerom
  vytvorenia novej tane nej skupiny Noir D. Malinovskej

  19.4. 2018             Prvý nácvik novej choreografie s p. Krba ovou, AKS

  16.6. 2018           Tanečný kongres, VŠMU, Bratislava
                        s témou Moderný tanec na Slovensku do r. 1989. Z Bralenu si
  pripravili príspevky Oľga Letenajová, Dagmar Puobišová, Janka Letenajová, Hela
  Žitňanová a Peter Hrozienčik. Myslím si, že to bolo významné podujatie ohľadom
  významu Bralenu pre toto obdobie

  6.9. 2018         Zrušenie VMT a nový tréning, AKS
                    Po repertoárovom tréningu sme sa so súborom dohodli pre zlú
  dochádzku a nenacvičenie repertoáru na zrušení blížiaceho sa predstavenia VMT v
  novembri v DK ZH. S A. Vrbičanovou sme sa dohodli na zaradení tréningu Horton I do
  harmonogramu a možnosti výpomoci v súbore ako pedagóga, žiaľ nie však ako interpret.




