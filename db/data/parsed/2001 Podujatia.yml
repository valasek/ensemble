year: 2001
year_description: |-
  ROK 2001
                                     (26. rok existencie)


  Rok 2001 v TD Bralen môžeme hodnotiť z niekoľkých hľadísk:
                      - z umeleckého hľadiska za najdôležitejšie podujatie považujeme
  uvedenie nového programu s názvom Spomienky. 1. premiéra bola uvedená v historickej
  budove opery SND a druhá taktiež v SND, ale tento raz na scéne činohry v DPOH. Obe
  predstavenia boli vysoko hodnotené odbornou verejnosťou a záverečné standing ovation
  potvrdili pozíciu TD Bralen ako špičkového umeleckého telesa, ktoré má dôležitú úlohu
  v kultúrnom dianí na Slovensku.
                      - z organizačného hľadiska sa nám v tomto roku podarilo nadviazať
  spoluprácu s dvoma novými sponzormi a to s Českými aerolíniami a Hotelom Dukla
  Bratislava. Obaja prispeli k skvalitneniu naších podujatí a v niektorách prípadoch by bez
  ich pomoci boli nerealizovateľné. ČSA prepravujú členov TD Bralen na svojich linkách za
  zvýhonených podmienok a Hotel Dukla ubytováva hosťov Bralenu. V marci tohto roku sa
  nám podarilo zrealizovať mnohoročnú túžbu a zakúpili sme 9 miestny mikrobus Fiat
  Ducato. Tým sme vyriešili dopravu Bralenu na predstavenia. Na väčšie vzdialenosti nás
  prepravujú ČSA a vlastným mikrobusom realizujeme predstavenia v okolí.

