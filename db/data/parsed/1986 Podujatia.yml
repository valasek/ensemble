  raw_header: Výročný program súboru Tremolo, DK ROH VSŽ, Košice
  name: Výročný program súboru Tremolo, DK ROH VSŽ
  location: Košice
  description: |-
    Slávnostný program z príležitosti 10. výročia založenia košického
    súboru moderného tanca Tremolo.
    Bralen bol pozvaný z dôvodu, že pri vzniku Tremola Rastislav Letenaj veľmi aktívne,
    nezištne a obetavo pomáhal pri jeho počiatočnej existencii. Jeho choreografia "Kameň,
    papier, nožnice" (hudba: P. Jarow, P. Stoockey) patrila niekoľko rokov do kmeňového
    repertoáru súboru. V komponovanom programe v DK ROH VSŽ Košice, sa Bralen
    predstavil choreografiami: “Nové renesančné tance”, “Fajnové odpoludnie”,
    “Temperamenty” a “Na Bacha”

