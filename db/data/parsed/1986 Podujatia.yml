  raw_header: Medzinárodná škola moderného tanca “Dance Connection”,
  name: Medzinárodná škola moderného tanca “Dance Connection”,
  location:
  description: |-
    Edinburgh, GB
         Organizačným vedúcim školy je Stephen Fox a odbomou vedúcou jeho manželka Kedzie
         Penfield. O začiatkoch školy hovorí S. Fox:
         "V roku 1979 sa Dance Connection, vtedy ešte známe ako škótsky spolok pre moderný
         tanec (Scottish Guild for modern dance) začalo zaoberať myšlienkou letnej tanečnej školy.
         Škola mala vychádzať v ústrety škótskym národným záujmom, ale keďže v tom čase
         neexistovalo na Britských ostrovoch, s výnimkou Londýna podobné podujatie, čoskoro sa
         ukázalo, že pôsobenie školy bude mať medzinárodný dosah."
              Prvými účastníkmi zo socialistických štátov boli vedúci pedagógovia Bralenu, Oľga a
         Rasťo Letenajovi.

         Oľga spomína: "Celej škole dominovala príjemná atmosféra, nedal sa pocítiť inde častý
         odstup medzi pedagógom a frekventantom. Niektorí učitelia vyslovene vyžadovali
         diskusiu, otázky a pripomienky. Keď mal pedagóg voľno, zacvičil si na hodine iného
         pedagóga. Škola prebiehala v telovýchovnom inštitúte, v štyroch sálach vedľa seba,
         vyučoval sa súčasne klasický, moderný, španielsky tanec a kontaktné improvizácie, ktoré
         boli vždy popoludní. Večer prebiehali pohybové hádanky (physical riddles), kde ak mal
         niekto problémy s nejakým pohybom, alebo choreografickým nápadom, tak sa kolektívne
         hľadalo riešenie, respektíve sme sa všetci učili, ako ten problém nájsť a definovať. Potom
         bol už podstatne jasnejší postup na jeho odstránenie.
               Mali sme šťastie, že sme bývali priamo u Penfieldovcov, čo nám umožnilo
         neformálne sa zblížiť s pedagógmi; škola pre nás pokračovala takmer nepretržite.
               Súčasťou podujatia boli predstavenia na sále a návštevy Edinburgského kultúrneho
         festivalu. Kto vyhral v tombole, išiel na divadelné predstavenie".

                                                                                             6z9
         Rastislav Letenaj spomína na pedagógov :"7. Letná škola mala zhodou okolností tiež
    7 pedagógov.

    Viola Farber - američanka, dlhodobá sólistka v Cunningham Dance Company, toho času
    pôsobiaca v London Contemporary Dance School. Na účastníkoch Edinburgskej letnej
    školy jej najviac prekážala akademičnosť a preto sa usilovala oživiť prirodzené zdroje
    pohybu doslova pohybovými šokmi. Do cvičení vkladala netradičné a nečakané pohyby -
    a zas presný pohyb. Bola to najväčšia pedagogická osobnosť tejto Letnej školy.
    Majstrovsky viazala tréning pre začiatočníkov a pokročilých.

    Bob Rease - z New Yorku, bol odbomík na kontaktnú improvizáciu.

    Scott Clark - vychádzajúci z labanovského ponímania priestoru je populárnym
    predstaviteľom mladšej generácie talentovaných učiteľov súčasného tanca. Na rozdiel od
    Violy Farber sa zameriaval na štúdium príčin pohybu v priestore.

    Kedzie Penfield - viedla zahrievacie cvičenia a základy pohybu a spolu so Scottom
    Clarkom pohybové hádanky. Pri zmienke o osobnosti Kedzie nemožno nespomenúť
    tanečno-pohybovú terapiu, medzi ktorej popredných predstaviteľov dnes patrí.

    Ďalšími pedagógmi Letnej školy súčasného tanca boli Anna Makard zo SRN, dcéra Kurta
    Joossa, ktorá stavia jeho choreografie na tanečných scénach celého sveta. Okrem toho
    učí európsky orientovaný moderný tanec.

    Angeles Colon z Madridu vyučovala španielske tance a Peter Connel, austrálsky tanečník
    a pedagóg, toho času pôsobiaci na London Contemporary Dance School, učil techniku
    klasického tanca. Hlavným predmetom jeho záujmu je štúdium klasického tanca v
    príprave interpretov pre moderný tanec.”
