  location: Košice
  description: |-
    Vystúpenie v Košiciach, v Dome detí a mládeže na 2. Víkende
    moderného tanca, organizovanom Tanečným centrom La Mosca (Peter Mucha) v
    Košiciach. TD Bralen uviedlo Žít je strácet, znovu mít a Ave Mária.

         Podujatie sa opäť uskutočnilo v príjemnej atmosfére v Dome detí a mládeže v
    Košiciach. Pozostával ako minulý rok, z niekoľkých praktických seminárov, ktoré viedli:
    Bruno Genty (Francúzsko), Ivanka Kubicová (AMU Praha) a Jana Kekeňáková (TD Bralen).
