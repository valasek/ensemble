  raw_header: MTT ’93, Laterna magika, Praha
  name: MTT ’93, Laterna magika
  location: Praha
  description: |-
    Vystúpenie TD Bralen v komponovanom programe s choreogra ou
    “Žít je strácet znovu mít”. Neskúsenosť nových tanečníkov Bralenu a celkový dojem z
    jeho vystúpenia tak nedosiahol kvalitu, na ktorú boli diváci zvyknutí. Dana Paseková v
    aprílovom čísle Tanečných listov 1993 napísala:
          "Záměrně sem se nezmínila o vystoupení bratislavského souboru Bralen, který se
    zrejmě v současné době nachází ve vážné krizi. Snad generační změna?" Mala pravdu.

                                           MTT '93
                         22.1. 1993, Nová scéna Laterny magiky, Praha

