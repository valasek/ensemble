- date_from: '1984-11-23'
  date_to: '1984-11-25'
  raw_header: 4. Festival moderného scénického tanca, Banská Bystrica
  name: 4. Festival moderného scénického tanca
  location: Banská Bystrica
  description: |-
    Prestávka, Temperamenty, Fajnové odpoludnie. 3 ceny, 5 diplomov
    Na tomto ročníku festivalu Bralen potvrdil, že jeho umelecká úroveň sa stále a rýchlym
    tempom zvyšuje a že patrí medzi špičkové súbory moderného tanca v republike.
    Predstavil sa choreografiami: "Fajnové odpoludnie", “Temperamenty”, “Prestávka”, ktoré
    boli vysoko ohodnotené ako po choreografickej, tak po interpretačnej stránke a získali
    ocenenia: Diplom a cena Dagmare Puobišovej za choreografiu "Temperamenty", Diplom a
    cena Jánovi Hartmannovi za choreografiu "Fajnové odpoludnie", Diplom a cena
    Rastislavovi Letenajovi, Patrícii Samuhelovej a Jane Kekeňákovej za interpretáciu. Súbor
    Bralen získal hlavnú cenu festivalu.
