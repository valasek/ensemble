- date_from: '1984-12-09'
  date_to: '1984-12-16'
  raw_header: Dielňa komorného tanca, Neubrandemburg, Lipsko
  name: Dielňa komorného tanca, Neubrandemburg
  location: Lipsko
  description: |-
    Rok 1984 vyvrcholil 1. zahraničným zájazdom celého súbru do NDR.
    Zájazd sa uskutočnil na základe pracovných a priateľských kontaktov so súborom
    Jurgena Goeweho Tanztheater Post Leipzig, na ktorom okrem predstavení viedli Oľga a
    Rasťo Letenajoví odborné, tanečné semináre. Uvádzaný repertoár bol: “Prestávka”,
    “Largo”, “Ebony concerto”, “Reminiscencie”, “Kliky bé”, “Futbal”, “Temperamenty” a
    “12+1”.

                        Zoznam účastníkov zájazdu:

              Rastislav Letenaj        Peter Hrozienčik
              Ján Hvizd                Jana Kekeňáková
              Ľubica Kopernická        Lucia Križanová
              Martina Kulišková        Eva Kurtiová
              Mária Lisá               Ivana Moravčíková
              Erika Ostrožlíková       Iveta Procházková
              Xénia Radová             Ján Steinhübel
              Veronika Studená         Eduard Trtílek
              Ján Úžik                 Oľga Letenajová
