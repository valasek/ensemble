                   19.10. 2019          TeenDance, Bratislava
                                        Výstúpenie TD Bralen v rámci programu sú aže TeenDance, ktorú
                   spolu-organizovala Júlia Olexová. Ako dobrovolní ka na akcii pomáhala K. Šešerová a do
                   publika prišli podpori ešte K. Milu ká, S. Štrofová a S. Tejedyová. TD Bralen sa uviedol
                   choreografiou “To je moja stoli ka”; tancovali V. Karazei, H. Lazíková (obe premiérovo) a T.
                   Duras
                   T. Duras sa podujatia zú astnil tiež ako len poroty, celá akcia však mala priate ský
                   charakter s úmyslom motivova tane níkov k alšej innosti.

                   21.10. 2019         Návšteva predstavenia Nomad, SND, Bratislava
                                       Boli sme spolu na tane nom predstavení Nomad, choreografia Sidi
                   Lardi Cherkaoui (BE), v inohre SND. Zú astnili sa: Kopnická, Mikšová, Milu ká,
                   Šešerová, Štrofová, Duras
                   Na sále prebiehal individuálny repertoár, Jurkovi ová oznamuje ukon enie pôsobenia v
                   súbore pre nedostatok asu.

                   2.11. 2019           Návšteva predstavenia 40. výročie Györi balet, Györ, H
                                        T. Duras organizoval výlet braleňákov na predstavenie Györi balet k
                   ich 40. výročiu. My (J&R) sme išli autom a brali sme M. Pobožnú a H. Lazíkovú. V Györi
                   sme sa stretli pred divadlom s T. Durasom a V. Karazei. Išli sme sa prejsť a v Palfyho
                   reštaurácií som všetkých pozval na večeru. Lístky vykomunikoval Tomáš s divadlom
                   zadarmo, lebo v predaji neboli. Predstavenie bolo len pre pozvaných. Videli sme 2
                   choreografie Romantic a Bolero a asi hod. ďakovných rečí v maďarčine. Po predstavení
                   som naložil všetky dievčatá a v Bratislave porozvážal domov. Tomáš išiel autobusom.
                   Bolo to príjemné podujatie.

                   9.-10.11. 2019                             Sústredenie, AKS
                                                              zamerané na tvorbu novej choreografie s Vitou Karazei.

