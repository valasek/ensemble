                   20.2. 2019                Repertoárový tréning s p. Letenajom, AKS
                                             ktorý prečistil tanec "Moje Sestry"

                   23.-24.2. 2019     Dance Festival Zlín, ČR
                                      Predstavenie prebehlo úspešne, TD Bralen premiérovo uviedol
                   tanec “Chcem? Nechcem?” v choreografii Marty Mešťaníkovej (premiéru tancovala
                   Kosečková), ďalej vystúpil s tancami “Moje Sestry” (premiéra Milučká, Šešerová,
                   Zajícová) a Otec Smútok, matka Nádej (premiéra pre Karazei, Milučká, Plesníkova a
                   sólo premiéra Kosečková). Na sprievodných seminároch učil Duras techniku J.Limóna a
                   Jazz.

                   7.-10.3. 2019      Joe Alegado v TD Bralen, AKS
                                      J. Alegado odu il v Bralene 6 tréningov, dva namiesto štvrtkového
                   Limóna a repertoáru a štyri po as víkendu. Na tréningy sme nepozývali udí z Verejnosti,
                   ú as braleňákov však bola na hranici pokrytia nákladov. Víkend pokra oval sústredením
                   s Romanou Lampartovou, pokra ovali sme v nahadzovaní jej choreografie.

                   14.3. 2019         Narodeniny s p. Letenaja, AKS
                                      Ukázali sme mu vznikajúce choreografie od M. Meš aníkovej a R.
                   Lampartovej. B. Šoganová oznámila ukon enie pôsobenia v súbore pre nedostatok asu
                   plnohodnotne sa venova súborovej aktivite.

                   23-24.3. 2019       WW zamerané na balet, u ili M. Zubáková (balet) a T. Duras
                                       (Graham a variácie). Tréning Graham mala pôvodne u i D. Be áková,
                   no nemala pozna enú zmenu termínu WW. 19. účastníkov. Brale áci následne využili
                   priestory TDB na víkendovú prespáva ku.

                   6.-7.4. 2019        Sústredenie, AKS
                                       zamerané na dokon enie a pre istenie Lampartovej choreografie.
                   Sobotný tréning viedol T. Duras so zameraním na kontaktnú improvizáciu a vzájomné
                   vnímanie sa, potrebné nie len pre túto choreografiu. V nede u s nami R. Lampartová
                   pre istila choreografiu.

                   10.4. 2019                Tréning s R. Lampartovou, AKS
                                             Čistili sme jej novú choreografiu.

                   11.4. 2019                Simona Tejedyová na školskej besiedke
                                             vystúpila s choreografiou od Durasa na hudbu od Sia-Thunderclouds.

