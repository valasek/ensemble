                   14.-15.9. 2019      Sústredenie súboru, AKS
                                       zamerané na sú asný tanec s Jozefom Va om. Pôvodný plán bolo
                   zavola Jozefa, aby sa s nami podelil o skúsenosti zo zahrani ia v rámci rozcvi ky. Po as
                   dohadovania prišiel s návrhom, že by rád so súborom skúsil spravi choreografiu.
                   Napokon od tohto nápadu ustúpil a venoval sa technike sú asného tanca a niektorým
                   princípom vzniku "performance" choreografie.

