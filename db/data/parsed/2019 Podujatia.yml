year: 2019
year_description: |-
  ROK 2019
                                     (44. rok existencie)

  Najdôležitejšie podujatia tohto roku:

  28.-31.1. 2019     Prijímacie pohovory na VŠMU
                     Z Bralenu sa hlásia K. Milučká (choreografia, moderný tanec) a M.
  Mátušová (tanečné divadlo a performancia). K. Milučká bola prijatá na moderný tanec,
  M. Mátušová žiaľ nie.

  23.-24.2. 2019      Dance Festival Zlín, ČR
                      Predstavenie prebehlo úspešne, TD Bralen premiérovo uviedol
  tanec “Chcem? Nechcem?” v choreografii Marty Mešťaníkovej (premiéru tancovala L.
  Kosečková), ďalej vystúpil s tancami “Moje Sestry” (premiéra K. Milučká, K. Šešerová,
  S. Zajícová) a “Otec Smútok, matka Nádej” (premiéra pre V. Karazei, K. Milučká, E.
  Plesníkova a solo premiéra L. Kosečková). Na sprievodných seminároch učil T.Duras
  techniku J. Limóna a Jazz.

  7.-14.7. 2019    Ma ovanie priestorov TD Bralen, AKS
                   Zmena správcu budovy, sa prejavila. Dnes nám začali maľovať sálu,
  chodbu a obidve WC-ká. Mali by urobiť aj strop na sále - znížiť ho a dať nové svietidlá.

  11.9. 2019         Vytvorenie novej funkcie v TD Bralen, AKS
                     Riaditeľ súboru R. Letenaj zrušil pozíciu Vedúci tanečného súboru a
  vytvoril novú Umelecký šéf Tane ného divadla Bralen. Do tejto funkcie menoval T. Durasa




