- date_from: '2019-11-25'
  date_to:
  raw_header: Oslava narodenín T. Durasa, AKS
  name: Oslava narodenín T. Durasa
  location: AKS
  description: |-
    Oslavu zahájili narodeninovým boogie, ktoré sa dou ili aj ostatní
               lenovia súboru a prinesením torty, ktorú robila p. Mikšová. Následne zatancovali
              zanikajúci tanec “Bezsenné noci”, kde sa kritické solové miesto dou ila K. Milu ká. Spolu
              sme si potom zatancovali Cestu, so šamankou Martou. Oslava pokra ovala krájaním torty
              a dar ekom - hrn ekom so Samkom i podpismi všetkých lenov súboru a tiež liatym i
              granulovaným Grankom v špeciálnom obale s fotkami. Na záver sme sa ešte raz presunuli
              na sálu, kde alší zanikajúci tanec, “Doktor as”, odtancovali diev atá v obsadení S.
              Zajícová (klobú ik), K. Šešerová (koše a) a M. Meš aníková (kravata). Brale áci mi
              pripravili naozaj krásny ve er, plný dojímavých momentov.
