                                  8.-9.6. 2019        Sústredenie súboru a prípravky, AKS
                                  zamerané na nácvik 4. asti tanca “Cesta je nádej, nádej je cesta”. Okrem 4. asti sa
                                  podarilo nahodi aj spolo né asti z druhej a tretej asti choreografie. Sústredenie bolo
                                  tiež spojené s opeka kou na Železnej Studienke.

                                  19. a 20.6. 2019     Preradenie dievčat z Prípravky do Súboru, AKS
                                                       Na súborový repertoár boli prizvané aj diev atá z prípravky, ktoré sa
                                  zú astnili sústredenia a nácviku choreografie “Cesta je nádej, nádej je cesta” - M.
                                  Mikšová, K. Nováková, S. Tejedyová. S M. Mikšovou sme sa dohodli na preradení do
                                  súboru od septembra. O preradení do súboru som sa v alších d och rozprával aj s
                                   alšími diev atami: M. Pobožná a Š. Štrofová vyjadrili nadšenie. A. Jurkovi ová a E.
                                  Kopnická vyjadrili neistotu s tým, i by to stíhali, bližšie sa dohodneme v septembri.

                                  26.6. 2019         Nácvik programu na zajtrajšie posedenie, AKS
                                                     k ukon eniu 44. sezóny. Nácviku sa pasívne zú astnila aj S. Štrofová.
                                  K. Nováková si neš astne vyvrtla nohu, o om som sa dozvedel až alší de . Z tohto
                                  dôvodu sa zú astnila posedenia iba ako divák.

                                  27.6. 2019           Posedenie súboru a prípravky, AKS
                                                       k ukon eniu 44. sezóny. T. Duras zhodnotil sezónu, v ktorej sa
                                  podarilo da pod strechu 71 minút repertoáru. Samostatný program však v sú anej chvíli
                                  TDB ešte nie je ešte schopný vytvori . Predstavuje plány do budúcej sezóny, ktoré
                                  zah ajú predovšetkým 45. Výro ie - predstavenia, ako aj iné sprievodné podujatia, ktoré
                                  však ešte nie sú ale dohodnuté. Oboznamuje lenov so zmenami v harmonograme,
                                  predovšetkým so zaradením tretieho repertoárového tréningu na pondelok. Sú as ou
                                  ve era boli aj ukážky tancov, na ktorých brale áci pracovali v ostatných mesiacoch:
                                  “Bezsenné noci”, “Thunderclouds”, “Revelations” - ukážka z hodín Hortonovej techniky
                                  pod vedením A. Vrbi anovej, “Chcem? Nechcem?”, “Basso Continuo”. Ako prekvapenie
                                  pre Letenajovcov sme si na záver nechali štvrtú as “Cesta je nádej, nádej je cesta”

                                  1.-5.7. 2019        1. Týždeň Letnej školy tanca v TD Bralen, AKS
                                                      u ili D. Be áková (Graham II), B. Lanczová (Limón I, Modern jazz II),
                                  A. Vrbi anová (Horton I/II), M. Zubáková (Klasika I), T. Duras (Variácie). 45 účastníkov.

                                  6.7. 2019           Brigáda, AKS
                                                      Stretli sme sa v Bralene, aby sme pomohli pripravi priestory pre
                                  ma ovanie. Prišli pomôc : V. Karazei, L. Kose ková, E. Plesníková, M. Strá aiová, K.
                                  Šešerová (s priate om), T. Duras

