  raw_header: Sústredenie Súboru a Prípravky, AKS
  name: Sústredenie Súboru a Prípravky
  location: AKS
  description: |-
    Na rozcvičkovú časť sústredenia boli prizvané aj dievčatá z prípravky.
    Pôvodne mala túto časť sústredenia viesť D. Brániková, workshopom v štýle Afro
    Contemporary. Nedorozumením však napokon nemohla prísť. Ako dôsledok viedol T.
    Duras improvizovaný workshop cielený na improvizáciu a zapojenie herectva do pohybu.
    Repertoárová časť bola venovaná novej kompozícii od T. Durasa, ktorá by mohla byť
    použitá ako ďalšia časť k celku, ktorý začal vznikať na jar 2024.
