- date_from: '2024-03-25'
  date_to:
  raw_header: Stretnutie Súboru, AKS
  name: Stretnutie Súboru
  location: AKS
  description: |-
    Na tréningu sme si zhodnotili VMT, na jednej strane veľký úspech, že
    sa nám podarilo v tomto počte zrealizovať samostatný program, a že sme sa po dlhej
    odmlke prezentovali aj v Bratislave. Na druhej strane veľmi náročný proces príprav pre
    slabý proaktívny prístup, nízku pracovnú morálku a zodpovednosť pre súborovú činnosť.
    Tieto negatívne skúsenosti so súborom zdieľala aj M. Šeďová, ktorá aktívne vypomáhala
    pri nácvikoch na VMT. T. Duras očakával čiastočný rozpad súboru, ku ktorému však
    nedošlo.
