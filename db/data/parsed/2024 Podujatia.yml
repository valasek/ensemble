    13-14.1. 2024         Sústredenie súboru, AKS
                          V pláne boli oba víkendové dni, no pre viaceré absencie a choroby
    sme sa stretli iba v nedeľu. S B. Šoganovou sme sa dohodli na jednom intenzívnom dni a
    zakončení procesu. Celoročný proces začal ako príprava na záverečnú prácu B.
    Šoganovej na štúdiu na JAMU v Brne a možná choreogra a do repertoáru TDB. Približne
    v polovici procesu B. Šoganová prehodnotila svoj zámer použiť tento proces ako svoju
    záverečnú prácu (komplikácie s dohodnutím termínu a miesta záverečnej práce s
    pedagógmi vyhovujúce aj pre súbor) a plánovala dokončený proces spojiť s vlastným
    vystúpením v Brne v neurčenom termíne. O tomto však T. Durasa informovala až na
    prelome rokov 2023/2024. Vzhľadom na nestálosť súboru, nutnosť zapojenia všetkých
    jeho členov do procesu a aktuálne vysoký počet maturantov v súbore je vysoko
    nepravdepodobné uvedenie procesu pre verejnosť.
