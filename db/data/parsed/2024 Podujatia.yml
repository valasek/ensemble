  location: AKS
  description: |-
    Na konkurz prišli 2 dievčatá, obe sme vzali do prípravky. Z letných
    škôl sa pridali ďalšie tri dievčatá, z toho jedna do súboru: K. Szarková.
- date_from: '2024-09-02'
  date_to:
  raw_header: Začiatok 50. sezóny, AKS
  name: Začiatok 50. sezóny
  location: AKS
  description: |-
    Prvým tréningom sezóny bol uzatvorený tréning pre Prípravku (viedol
    T. Duras), otvorený tréning Limóna pre Verejnosť (viedla. B. Lanczová) a repertoárový
    tréning Súboru (viedol T. Duras). Na uzatvorených tréningoch sme sa zvítali po letných
    prázdninách a prešli organizačné náležitosti a predbežné plány do sezóny.
    K septembru ukončili pôsobenie v súbore: V. Blahová, E. McKillop, M. Mikšová. K súboru
    sa pridali M. Borovská, S. Osvaldová, A. Perfecká (z prípravky) a K. Szarková (z letnej
    školy). V súbore mala začať aj E. Jursová, ktorej však rodičia umožnili zatiaľ len jeden
    repertoárový tréning z dvoch v týždni. Vedená je naďalej ako člen prípravky. Tretinu
    súboru tvoria noví členovia, čaká nás kopa práce.

          Aktuálny rozvrh tréningov na novú sezónu:
                Pondelok     15:45-17:15 Prípravka, T. Duras
                             17:30-19:00 Limón II, B. Lanczová
                             19:15-20:45 Repertoár
                Utorok       17:30-19:00 Jazz, K. Milučká
                Streda       15:45-17:15 Prípravka, T. Duras
                             17:30-19:00 Balet I, M. Motlochová
                             19:15-20:45 Flamenco, M. Motlochová
                Štvrtok      17:30-19:15 Balet I, T. Duras
                             19:15-20:45 Repertoár
- date_from: '2024-09-09'
  date_to:
  raw_header: Zatečenie stropu, AKS
  name: Zatečenie stropu
  location: AKS
  description: |-
    V období 29.7. - 1.11. prebiehala rekonštrukcia strechy objektu
    Apollo klubu Slovnaft. Pri prerábke strechy nad sálou a prívalových dažďoch z 9.9. nám
    zatiekol strop a objavili sa na ňom fľaky (veľká sála, chodba, šatňa dievčat, masážovňa,
    toalety). V niektorých miestnosťach začali steny plesnivieť. Našťastie to nebolo v rozsahu,
    ktorý by narušil našu činnosť.
- date_from: '2024-09-14'
  date_to:
  raw_header: Stretnutie vedenia u Letenajových, Malinovo
  name: Stretnutie vedenia u Letenajových
  location: Malinovo
  description: |-
    Stretnutie sa zameriavalo na plánovanie osláv 50. výročia TD Bralen,
    vrátane organizácie predstavení, vydania knihy, vytvorenia archívu a zapojenia bývalých
    členov. Diskutovalo sa o problémoch s predchádzajúcimi vydaniami kníh a o zlepšení
    priestorov a propagácie cez sociálne siete atď. Stretnutia sa zúčastnili: J. Letenajová, R.
    Letenaj, K. Milučká, M. Šeďová. a T. Duras.
