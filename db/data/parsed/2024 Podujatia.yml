year_description: |-
  ROK 2024
                                     (50. rok existencie)

  Najdôležitejšie podujatia tohto roku:

  19.-21.1. 2024       Workshop s J. Alegadom, Zlín, ČR
                       H. Tomášková (rod. Vašková), bývalá braleňáčka a aktuálne vedúca
  súboru Dancing People v Zlíne, organizovala workshop s Joe Alegadom. Zúčastnilo sa 7
  braleňákov: M. Bazovská, M. Borovská, M. Brisudová, S. Osvaldová, K. Milučká, S.
  Zajícová a T. Duras.

  3.- 4. 2. 2024     WW Fyzio - Cvičenie podľa ročných období
                     Janka Letenajová urobila ďaľší víkendový workshop (pred operáciou
  svojho druhého bedrového kĺbu). Nadviazala na svoje dva úspešné workshopy z roku
  2023 (WW Fyzio - Prevencia pred úrazmi a WW Fyzio - Aby pohyb nebolel).

  10.2. 2024          Vystúpenie, NKD Rača
                      TD Bralen vystúpil na plese v Rači, pozvánku na tancovanie
  sprostredkovala M. Brisudová. V dvoch vstupoch sme tancovali "Basso Continuo”, "To
  je moja stolička" a "Narodeninové Boogie”.

  24.3. 2024         Večer Moderného Tanca, DK Dúbravka
                     Samostatný program TD Bralen s 9 choreogra ami v programe.

  1.-5.7. 2024       1. týždeň Letnej školy tanca v TD Bralen, AKS

  5.-9.8. 2024       2. týždeň Letnej školy tanca v TD Bralen, AKS

  21.10. 2024         Workshop, AKS
                      V rámci akademického pobytu na VŠMU nám B. Lanczová
  sprostredkovala francúzskeho pedagóga Razu Hammadiho, žiaka M. Mattoxa. Raza
  Hammadi odučil na sále TD Bralen jednu lekciu jazzového tanca pre našich členov.

  1.-3.11. 2024      Workshop, AKS
                     Joe Alegado odučil 3 lekcie technického tréningu a začal pracovať
  na novej choreogra i.

  14.12. 2024          Hra Chyťte Chaplina, Východočeské divadlo, Pardubice
