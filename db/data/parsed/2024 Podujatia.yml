- date_from: '2024-02-29'
  date_to:
  raw_header: Zbehávka programu na VMT, AKS
  name: Zbehávka programu na VMT
  location: AKS
  description: |-
    Na sále TDB sme zrealizovali predbežnú zbehávku programu na
         plánovaný VMT, aby sme včas vychytali nedostatky a vykonali prípadné potrebné úpravy.
         Na tie však napokon nevyšiel dostatok času, hneď ďalší týždeň boli v BA kraji jarné
         prázdniny a v kombinácii s chorobnosťou sme sa počas prázdnin nedokázali ako súbor
         stretnúť. Niektorí členovia súboru zároveň považovali zbehávku za nálne obsadenie
         (napriek tomu, že boli informovaní, že to tak nemusí byť) a vyjadrili svoju nespokojnosť.
         Ukázal sa však aj rozdielny prístup niektorých členov - M. Brisudovej porazenecký prístup
         vs. S. Zajícovej bojovný prístup, ktorým si aj neskôr získala obsadenie v choreogra i
         "Moje sestry.”
