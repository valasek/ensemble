  raw_header: Spoločný deň v Bralene, AKS
  name: Spoločný deň v Bralene
  location: AKS
  description: |-
    Spolu s Braleňákmi sme si spravili deň strávený pri spoločenských
         hrách, lme a tanci. Bolo to prvé stretnutie v 47. sezóne. Hrali sme Shadows, Time's up
         a po obede sme si pozreli lm Inside Out, ktorý spracováva podobnú myšlienku, ako je
         myšlienka novej choreogra e od T. Durasa. Okrem iného sme si zatancovali na sále
         tance z nášho repertoáru. V priebehu dňa (od desiatej rána do ôsmej večer) sme sa
         prestriedali všetci Braleňáci, ktorí tvoria súborovú skupinu v novej sezóne.
         K záveru dňa ma K. Šinská, zatiaľ súkromne, informovala, že čaká prírastok do rodiny a
         približne po Vianociach už zrejme nebude môcť aktívne pokračovať v súbore.
