  raw_header: Hosťovanie v galaprograme Halo Halo, DK ZH
  name: Hosťovanie v galaprograme Halo Halo
  location: DK ZH
  description: |-
    Črtalo sa možné vystúpenie v rámci galaprogramu tanečnej skupiny
         Halo Halo dňa 27.6. Pri tejto príležitosti sme sa pustili do čistenia tanca “Cesta je nádej,
         nádej je cesta”. Programu sme sa, napriek niekoľkým týždňom nácviku, napokon z
         organizačných dôvodov nezúčastnili. Program, primárne určený deťom z Halo Halo a ich
         rodičom, sa natiahol na neúnosnú dĺžku a množstvo ich vlastných čisel muselo byť
         poškrtaných. S vedúcou skupiny, Erikou Brandnerovou, sme sa predbežne dohodli na
         hosťovaní na zimnom programe a včasnom vytvorení konceptu.
