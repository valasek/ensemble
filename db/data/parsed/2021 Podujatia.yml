- date_from: '2021-11-20'
  date_to:
  raw_header: Repertoár, AKS
  name: Repertoár
  location: AKS
  description: |-
    Od najbližšieho pondelka (22.11.) dochádzka k sprísneniu
         fungovania pre zhoršenú situáciu s Covid-19 a opäť sa začína skloňovať aj slovíčko
         lockdown. Namiesto plánovaného predstavenia sme si so súborom dohodli náhradný
         tréning na dokončenie a natočenie choreogra e T. Durasa aj v kostýmoch. Zábery z
         nahrávky sa majú použiť aj na dokumentáciu k projektu FPU, nakoľko je vysoko
         pravdepodobné, že v tomto kalendárnom roku sa už na javisko zrejme nedostaneme.

