  location: AKS
  description: |-
    Posledný tréning 46. sezóny - na tréning klasiky sme si s dovolením
         Janky Letenajovej zapožičali tlopty a pod vedením K. Milučkej sme si vyskúšali viaceré
         podporné cvičenia metódy "Progressing Ballet Technique."
         Na repertoári sme uzavreli túto nešťastnú sezónu, postihnutú viacerými výpadkami a
         neistotou v dôsledku pandémie koronavírusu. Bola to sezóna prežívania, v snahe
         zamedzenia pádu, prípravy do budúcnosti (tvorba dvoch choreogra í od V. Karazei, T.
         Durasa, obnova tanca "Tres Canciones"), no bez verejného vystúpenia. Je čas to zmeniť,
         snáď nám to už nič neprekazí.
- date_from: '2021-07-01'
  date_to:
  raw_header: Piknik, Sad Janka Kráľa
  name: Piknik
  location: Sad Janka Kráľa
  description: |-
    Pôvodne plánovaná opekačka na Železnej Studničke bola pre veľmi
         suché počasie a zákaz kladenia ohňa v mestských lesoch presunutá do Sadu Janka
         Kráľa, kde sme si spravili piknik bez ohniska. Spolu strávený čas sme vyplnili najmä
         hraním spoločenských a loptových hier. T. Duras tiež zahral Braleňákom na gitare, čo bolo
         jeho prvé verejné hranie vôbec. Veľmi ho potešili svojou pozornosťou a podporou.
         Výhodou pikniku v Sade Janka Kráľa bola oproti Železnej Studničke väčšia exibilita pri
         príchodoch a najmä odchodoch. Príchod na miesto bol v čase medzi 10-11h a väčšia
         polovica zostala až do rozpustenia po 18. hodine.
