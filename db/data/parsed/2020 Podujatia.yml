    obdobne ako klasika, pri žrdi, so zakomponovanými prvkami záverečnej variácie.
    Počas sústredenia ma E. Kopnická informovala, že na ich škole bol pozitívny prípad na
    Covid-19 a že žiaci školy sa do odvolania preventívne izolujú.
