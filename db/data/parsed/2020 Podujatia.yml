  raw_header: Návrat do naších priestorov, AKS
  name: Návrat do naších priestorov
  location: AKS
  description: |-
    So Slovnaftom sme sa dohodli na opätovnom prenájme našich
    priestorov v AKS od 1.9. 2020. Taktiež súhlasil, že môžeme začať so sťahovkou už pred
    týmto termínom. Zrušili sme veľkú kanceláriu so skladom a presťahovali sme ju do šatne
    chlapcov. Kanceláriu sme zmenili na Malú sálu na individuálne tréningy. Prebehla aj
    reorganizácia skríň - kostýmy budú mať vyhradené dve skrine na chodbe, archív
    presunutý do kancelárie. Na sťahovke sa zúčastnili D. Letenajová, J. Letenajová, T. Duras,
    R. Letenaj, pomáhali tiež Daniel Schmidt a Oliver Aujeský.
