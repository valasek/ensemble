  raw_header: Sťahovanie v TD Bralen, AKS
  name: Sťahovanie v TD Bralen
  location: AKS
  description: |-
    Nakoľko nám Slovnaft dal dve možnosti ako ďalej s platením
    nájomného 1. platiť plné nájomné ako doteraz, alebo 2. odchod z AKS a vyprázdniť
    priestory. R. Letenaj ponukol Slovnaftu tretiu možnosť, necháme si len dve miestnosti
    (Masérňu a Pilates so skladom a sem si presťahujeme všetky veci a uvoľníme ostatné
    priestory, aby ich Slovnaft mohol prenajať inému záujemcovi. Súhlasili s tým, a tak
    sme všetko natlačili do skladu. Povyhadzovali sme všetko čo nebolo nutné na
    prežitie. Pri vyhadzovaní techniky a kostýmov nám bolo hrozne. Týmto sme však
    znížili nájomné z 1300€ na 300€ a tak sme vytvorili šancu na prežitie.
