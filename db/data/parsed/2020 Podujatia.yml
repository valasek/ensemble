  raw_header: WW workshop online, AKS
  name: WW workshop online
  location: AKS
  description: |-
    prvý víkendový workshop na online báze, na platforme Jitsi. Učili:
    M. Zubáková - klasika a B. Lanczová jazz a Limón. Technické zabezpečenie: T. Duras.
    Internetové spojenie (pevné, ani mobilné) nebolo dostačujúce pre vyššiu kvalitu
    prenosu. Príjem akurát pokryl náklady na pedagógov. Platiacich bolo 12, braleňákov
    10 a zisk bol 8€. Zabili sme 2 dni, pedagogická hodnota veľmi problematická
    (zasekávajúci sa obraz, posunutie zvuku voči obrazu, nemožnosť individuálneho
    opravovania atď). Pozitívom bolo vytvorenie takmer prefesionálneho TV štúdia v
    Pilates štúdiu T. Durasom.
