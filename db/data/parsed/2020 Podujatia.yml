year_description: |-
  ROK 2020
                                     (45. rok existencie)

  Najdôležitejšie podujatia tohto roku:

  5.2. 2020         Prijímacie pohovory na VŠMU
                    Paulína Červáková sa zúčastnila na prijímačkách na VŠMU, odbor
  moderný tanec a bola prijatá.

  23.2. 2020         Evans Dance Show, Štúdio Z, MD Zlín, ČR
                     TDB vystúpilo ako hosť na Evans Dance Show, organizovala Eva
  Nejedlá.

  11.3. 2020           COVID 19 - Oficiálne zatvárame priestory pre verejnosť, AKS
                       technické i repertoárové tréningy do odvolania zrušené. Posledný
  tréning, klasika (Duras)

  22.3. 2020        Nový harmonograme online tréningov
                    na najbližšie obdobie. V pondelok Graham (T. Duras), utorok
  Horton (M. Mikšová), streda klasika (M. Šeďová), štvrtok workout (M. Šeďová).

  16.4. 2020          Sťahovanie v TD Bralen, AKS
                      Nakoľko nám Slovnaft dal dve možnosti ako ďalej s platením
  nájomného 1. platiť plné nájomné ako doteraz, alebo 2. odchod z AKS a vyprázdniť
  priestory.

  23.-24.5. 2020     WW workshop online, AKS
                     prvý víkendový workshop na online báze, na platforme Jitsi. Učili:
  Zubáková - klasika a Lanczová jazz a Limón. Technické zabezpečenie: Duras.

  29.5. 2020           Slovnaft nám oznámil plány o uzatvorení priestorov
                       počas nocí, víkendov a štátnych sviatkov. Od týchto plánov
  neskôr na nevôlu nájomcov (Hromádka, Návrat, Letenaj a kaderníčka) čiastočne
  ustúpil a uzatvoril budovu AKS len v časoch od 23:00 do 6:00 hod.

  27.6. 2020         Svadba v Bralene
                     Kristína Šešerová sa vydáva za Jakuba Šinského.

  3.7. 2020          Zomrela Hela Žitňanová




  17.-23.8. 2020     Letná škola tanca, Mladočov, ČR
                     17. ročník Letnej školy sa napriek obavám z obmedzení kvôli
  Covid-19 uskutočnil.

  11.10. 2020          Nové epidemiologické opatrenia, Covid-19
                       S účinnosťou od najbližších dní budú platné opatrenia pre
  obmedzenie pandemickej situácie, ktoré sa dotknú aj TDB. Tréningy majú byť obmedzené
  na 6 ľudí, vrátane pedagóga. Od utorka 13.10. rušíme tréningy pre verejnosť

  19.12. 2020        Opäť celoslovenský Lock down
                     Dnes začína v našej krajine lock down, ktorý potrvá (asi) do 10.1.
  2021. Zákaz vychádzania, zatvorené obchody, len potraviny, drogérie a lekárne sú
  otvorené.
