  raw_header: Nové epidemiologické opatrenia, Covid-19
  name: Nové epidemiologické opatrenia
  location: Covid-19
  description: |-
    S účinnosťou od najbližších dní budú platné opatrenia pre
              obmedzenie pandemickej situácie, ktoré sa dotknú aj TDB. Tréningy majú byť obmedzené
              na 6 ľudí, vrátane pedagóga. Od utorka 13.10. rušíme tréningy pre verejnosť a
              prechádzame na krízový rozvrh - v pláne je pokračovať v činnosti súboru a prípravky.
                     Nový tréning na najbližšie obdobie: pondelok klasika pre prípravku (D. Horváthová),
              Limón pre súbor (T. Duras), utorok Horton online (M. Motlochová), streda repertoár (T.
              Duras), štvrtok jazz pre prípravku (T. Duras) a repertoár (T. Duras).
                     Z dôvodu zavedenia opatrení dochádza aj k zrušeniu plánovaného predstavenia
              Večera Moderného Tanca s Dancing People na Malej scéne v Zlíne, ktoré sa malo konať
