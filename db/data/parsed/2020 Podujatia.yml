- date_from: '2020-10-03'
  date_to: '2020-10-04'
  raw_header: Sústredenie súboru, AKS
  name: Sústredenie súboru
  location: AKS
  description: |-
    Sústredenie bolo zamerané na tvorbu novej choreografie T. Durasa -
    pokračovanie z konca augusta. Na sústredenie mala prísť aj bývalá členka, Barbora
    Šoganová, ktorá mala viesť herecký workshop a pomôcť tak s hereckou prípravou
              ostatných členov. Deň pred sústredením mi volala, že jeden z ich pedagógov bol
              testovaný pozitívne a zostáva preto v karanténe. Náhradnú rozcvičku preto dala Vita
              Karazei, pokračovala vo workshope z predošlého sústredenia, národné tance z Ukrajiny.
              Následne sme pokračovali nácvikom novej choreografie s pracovným názvom "Nemé
              hlasy." Dosiaľ máme vytvorené približne 3 minúty z predpokladanej dĺžky cca 15 minút.
              Sústredenie poznačila aj smutná situácia - otec L. Kubačkovej utrpel infarkt, Lucka
              cestovala domov.
