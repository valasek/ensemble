                             5.9. 2017           Stretnutie Brady súboru, reštaurácia Soho, Bratislava
                                                 na ktorom sme sa rozprávali o svojich predstavách, ktoré sa do
                             vä šinovej miery stotož ovali s predstavami p. Letenaja na predošlom stretnutí. alšími
                             témami stretnutia boli rozvrhnutie sezóny a možnosti propagácie predstavenia vo forme
                             rozlú ky, i vzdaniu pocty Letenajovcom.

                             6.9. 2017           Odovzdanie súborovej skupiny Brade, AKS
                                                 R. Letenaj privítal všetkých v novej sezóne a odovzdal súborovú
                             skupinu novému vedeniu: Duras, Malenovská, Mešťaníková a Vaľo.
                             Duras: Prvý tréning v 43. sezóne, na ktorom sme súboru predstavili nové vedenie štvorice
