                              18.-19.10. 2017      Repertoárové tréningy, AKS
                                                   boli, pre plánovanú neú as Marty (cestovné dôvody), pod vedením
                              D. Malenovskej. Zamerané boli na nácvik jej tanca “Dun Num” a prvé zoznámenie sa
                              súboru s ním. Nácvik v stredu prebiehal bez problémov, vo štvrtok však Malena meškala
                              viac ako 20 minút ( akali vonku s Grachovou na prizvaných hostí na nácvik choreogra e).
                              Po jej príchode viedla hodinu formou lyrical jazzu. Najprv som si myslel, že variácie, ktoré
                              so súborom nacvi ovala sú sú as ou choreogra e, to sa mi nepotvrdilo. Polovica
                              repertoáru bola z môjho poh adu použitá neefektívne. Radšej by som ju využil na
                              zopakovanie pripomienok zo sústredenia a dou enie Grachovej miesta Klobú iku v
                              Doktorovi as (tá sa sústredenia pre zdravotné ažkosti ako prvé obsadenie nezú astnila).

                              25.10. 2017          Stretnutie T. Durasa s M. Mešťaníkovou a Malenovskou, AKS
                                                    pred repertoárovým tréningom. Došlo k dvom nedorozumeniam.
                              Najprv s Martou o obsadení Špotákovej do tanca Doktor as. Pri nemožnosti obsadi
                              Grachovú do tohto tanca som s p. Letenajom konzultoval prípadné obsadenie
                              Špotákovej, o mi nebolo odporú ané. Tak sme si aj povedali pred tréningom. Napriek
                              tomu, po as kostýmovej skúšky ju Marta poverila tanec odtancova i s kostýmom, o
                              vyznelo ako jej obsadenie do tohto tanca. Druhým nedorozumením bolo oboznámenie
                              kolegý s harmonogramom predstavenia a postupnosti tancov v programe. Dun Num
                              malo ís v poradí druhé, po otváracom ísle TK EJ. Po as tréningu, k jeho koncu, ke
                              sme sa rozprávali o kostýmoch a lí ení, som toto opakovane povedal pred všetkými
                               lenmi súboru, na o sa Malena ohradila, že som jej vraj povedal, že ide jej tanec na
                              záver. Vyvolala tak verejný kon ikt pred súborom, v ktorom vyjadrila svoj názor, že by jej
                              tanec mal ís na záver. Marta ma nevedela podpori , lebo si nepamätala poradie, ktoré
                              som pred tréningom spomínal.

                              25.10. 2017                                   Zaradenie nového tréningu pre Verejnosť Graham pre začiatočníkov
                                                                            s Dominikou Beňákovou.

                              31.10.-1.11. 2017   Sústredenie, AKS
                                                  na závere né doladenie tancov pred predstavením. Bolo pozna ené
                              obmedzením zo strany hostí v choreogra i Dun Num, ktorí mohli iba v ur itých asoch. To
                              nám rozdelilo nácvik ostatných tancov na dve polovice a nejaký as tým zostal nevyužitý.
                              Na sústredení nebola prítomná ani Marta, ani Špotáková (obe odcestované). Za kone né
                              obsadenie miesta Klobúku v tanci Doktor as som ur il Pálkovú. Neoznámením tohoto
                              faktu Špotákovej vznikol alší kon ikt.

