                             21.11.2017          Stretnutie T. Durasa, M. Mešťaníkovej s p. Letenajom, AKS
                                                 kde sme ho oboznámili o rozhodnutí ostatných lenov rady. Marta
                             mala vyššie o akávania od stretnutia, a to najmä z mojej strany. Chela, aby sme preberali
                             už konkrétne predstavy ako ideme alej pokra ova . Tušil som mierne sklamanie z
                             priebehu tohto stretnutia na jej strane a oce ujem jej zaangažovanos a nasadenie pre
