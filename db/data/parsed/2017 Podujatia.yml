                             7.9. 2017           Kon ikt v Brade, AKS
                                                 Dochádza k prvému vážnemu kon iktu v Brade kvôli plagátom.
                             Po ich neskorom dodaní a nedorozumení oh adom ich nancovania, sme dostali plagáty,
                             s ktorými som sa (T. Duras) nevedel stotožni . Ostatní lenovia ich hodnotili pozitívne. Po
                             poukázaní na faktické chyby (nesprávna web stránka, názov miesta konania, nejasnosti
                             oh adom ich informatívnej hodnoty), sme plagáty nedávali do tla e, ale ich prezentovali
                             formou sociálnych sietí.

                             14.9. 2017           Repertoárový tréning, AKS
                                                  Chceli sme určiť obsadenie tancov do nášho rozlúčkového programu,
                             po zhliadnutí tancov sa naše plány rozplynuli. Predvedená úroveň choreogra í bola taká
                             zlá, že dôstojnejším ukončením je nerobiť nič! Termín programu sme ponúkli novému
                             Bralenu ako Večer moderného tanca s nejakým hosťom (odporúčali sme napr. Kozákovej
                             Moving Soul)
                                     Duras: Na repertoárový tréning sa prišli pozrie aj manželia Letenajovci. Zámerom
                             bolo zváženie novembrového predstavenia vo forme vzdania im pocty. Po víkende nám p.
                             Letenaj oznámil ich rozhodnutie nepokra ova v tomto zámere. V organizácii predstavenia
                             sme alej pokra ovali vo forme zachovania tradície Ve erov moderného tanca.

                             21.9. 2017            Konkurz, AKS
                                                   Prvý konkurz, ktorý sme neorganizovali my, ale T. Duras. Po akcii nás
                             informoval, že prijal do prípravky 10 dievčat a do súboru 6. Celkovo prišlo 16 dievčat.
                                     Duras: Konkurz do TD Bralen v réžii dua Duras + Malenovská. Do súboru bolo
                             prijatých 6 nových lenov (Veronika Palková, Zuzana Ma icová, Lucia Kose ková,
                             Barbora Šoganová, Lucia Kocáková, Dominika Fiedlerová). Do prípravky bolo prijatých 10
                               lenov, z ktorých však nik nevydržal ani do konca kalendárneho roka.

                             23.-24.9. 2017     Víkendový workshop WW- súčasný tanec, AKS
                                                Víkendový seminár zameraný na súčasný tanec. Mal učiť Vaľo,
                             bohužiaľ pre malý počet prihlásených sme ho museli zrušilť!

                             1.10. 2017                     Sústredenie, AKS
                                                            T. Duras nás zavolal na sústredenie. Úloha bola vyčistiť Mesto. Úlohu
                             sme splnili.
