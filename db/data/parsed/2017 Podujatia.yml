                             2.-3.12. 2017                                        Sťahovka v Bralene, AKS

                             7.-8.12. 2017         Repertoárový tréning, AKS
                                                   M. Mešťaníková nebola v stredu prítomná a po mesiacoch plných
                             ústupkov, ktoré i tak neviedli k vyriešeniu problémov, som vzal repertoárový tréning do
                             vlastných rúk. Tréning bol pozna ený ve kou absenciou hlavne na jeho za iatku, mnohí
                             meškali a prišli až ke už sme boli zabehnutí v nácviku tanca Karant, jeho druhej asti.
                             Štvrtok viedla tréning opä Marta a dostáva sa do kon iktu najmä so Špotákovou. Pri
                             snahe Martu uk udni sa dozvedám, že už sama rozmýš a o tom, že alej nebude
                             pokra ova .
                             Ve er po tréningu sa ku mne dostáva informácia cez Silviu Nemcovú, ktorá po as toho,
                             ako bola v šatni so Špotákovou a Vaškovou dostala nechutným spôsobom jasný signál o
                             tom, že mi má odkáza "aký bol dobrý v erajší tréning s Tomášom". Nespokojnos
                             niektorých lenov súboru s vedením hodín pod Martinou taktovkou ma na jednej strane
                             vytá a, ke vidím, ako si nevedia váži naozaj ni oho, no zárove aj istým zvláštnym
                             spôsobom uk ud uje, pretože si za ínam uvedomova , že niektorým u om lovek
                             neulahodí, nech by spravil oko vek.

                             9.12. 2017                                           Rebriny a dosťahovanie novej kancelárie.

                             13.12. 2017         Duras: Stretnutie s Martou (v blízkom business centre)
                                                 rozprávali sme sa o možnom od lenení niektorých lenov súboru od
                             nového roka, ako aj o tom, že sama zvažuje alej nepokra ova . Uvidíme ako sa situácia
                             vyvinie po prázdninách, ke sa sná stretneme k udnejší a oddýchnutejší.

