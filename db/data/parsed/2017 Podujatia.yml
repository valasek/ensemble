                                                               - prestávka -
                                           6. Last Moment                                                           tancuje: TD Bralen a TK EJ
                                           7. Objavená                                                              tancuje: TK EJ
                                           8. Máš veľa, ak sa máš kam vrátiť                                        tancuje: TD Bralen
                                           9. V čakárni                                                             tancuje: TK EJ

                                  6.11. 2017           Stretnutie s Bradou, AKS
                                                       Stretnutie Rasťa s Malenovskou a Mešťaníkovou. Téma bola nezhody
                                  a nedobrá komunikácia medzi Tomášom a nimi, čo nerobí dobrú atmosféru v súbore.
                                        Duras: Stretnutie s Martou a p. Letenajom, na ktorom sme sa rozprávali o
                                  predstavení, ako aj o Malenovskej súbore v súbore. Po našom stretnutí mal p. Letenaj
                                  dohodnuté stretnutie s Malenou, na ktoré sa pridala aj Marta. Na stretnutí mu oznámila,
                                  že nechce za týchto podmienok alej fungova ako len rady, iba ako len súboru a
                                  pedagogického zboru.

                                  8.11. 2017           Stretnutie R. Letenaja so súborom, AKS
                                                       Hodnotenie predstavenia a návrh Rasťa na riešenie zlej komunikácie
                                  medzi súborom, Tomášom a “zbytkom” Brady. Duras: Zhodnotenie VMT so súborom a
                                  následné pripomienkovanie súboru v zastúpení Grachovej o nezhodách v Rade súboru a
                                  spolo nej komunikácii. Pri vypo utí týchto pripomienok som si uvedomil, že sú mi
                                  pripisované aj mnohé chyby, ktoré v kone nom dôsledku nimi priamo nie sú. Beriem si
                                  však zo stretnutia jedno dôležité - treba zlepši svoju i spolo nú komunikáciu.

