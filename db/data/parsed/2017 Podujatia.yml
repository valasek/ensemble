               sa WW s J. Vaľom. Po as fotenia vzniká aj neskôr použitá fotogra a na propagáciu VMT
               so S. Grachovou na jej titulku.

               21.7. 2017           Stretnutie s J. Vaľom a p. Letenajom, AKS
                                    Duras: ktorého hlavnými témami boli sociálne siete (facebook,
               instagram, možný twitter), web stránka, konkurz, video promo, VMT v novembri a
               základný nan ný preh ad. Tému možnosti VMT formou rozlú ky sme odložili na
               september, na stretnutie so súborom. Zhrnutím tohto stretnutia bolo, že hlavnou prioritou
               Brady by mala by predovšetkým práca so súborom, umelecká innos , ako aj udržanie
               atraktivity súboru pre jeho lenov.

               31.7.-4.8. 2017     LŠT v TD Bralen 2. beh, AKS
                                   U ili M. Zubáková, D. Be áková, Z. Sehnalová, B. Lanczová, D.
               Malenovská, T. Duras; 48 účastníkov. Prebehlo natá anie videí na hodinách Limóna a
               sú asnej. V pôvodnom pláne bolo i nato enie klasiky a LA jazzu, ktoré som sa po zvážení
               svojej nízkej asovej kapacity pre ich post-produkciu rozhodol odloži na neskorší termín
               v priebehu roka.

               3.8. 2017         Stretnutie Brady súboru, AKS
                                 Duras: ktorého nápl ou bolo dohodnutie vytvorenia propaga ných
               plagátov na WW a konkurz, rozvrhnutie asu konkurzu pod vedením dua Duras +
               Malenovská, videopozvánka na konkurz (nezrealizovala sa), plánované workshopy,
               podmienky choreografov pre novú tvorbu.

               8.8. 2017            Stretnutie Brady súboru (okrem Vaľa) s p. Letenajom, AKS
                                    Duras: o predstavách jej fungovania. Na stretnutí nám p. Letenaj
               vyslovil svoju predstavu, ako by rada mohla fungova . Jozef by pod a jeho predstavy
               mohol zastrešova marketing a ekonomiku, Marta vnútorný život súboru, Dominika
               umelecký rast a tvorbu, s Tomášom v pozícii koordinátora. Za úlohu nám dal podrobne si
               premyslie úlohy, ktoré by sme si my predstavovali zastupova , ako aj vytvori plán na
               nadchádzajúcu sezónu.

