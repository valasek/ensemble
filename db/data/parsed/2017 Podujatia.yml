                                  2.11. 2017         Repertoárový tréning
                                                     Posledný repertoárový tréning pred predstavením. Videli sme tance,
                                  ktoré budú na predstavení uvádzať. Mesto, Haiti a Doktor čas.

                                  4.11. 2017           Večer moderného tanca, DK ZH, Bratislava
                                                       Predstavenie TD Bralen v DK Zrkadlový háj s hosťom TK EJ a
                                  tanečníkmi z VŠMU. Duras: Ve er Moderného Tanca v spolupráci s TKEJ. Prvé
                                  predstavenie, ktoré z ve kej asti organizujem pod svojim menom. I ke ešte stále so
                                  zna nou pomocou od p. Letenaja. Predstavenie je pozna ené zlou technickou podporou
                                  zo strany DK Zrkadlový háj. Na skúšku dodalo jedného, relatívne nového, technika, so
                                  zlomenou rukou. Nastavovanie svetiel tak výrazne ohrozilo predstavenie. Naš astie, v
                                  kone nom dôsledku nepozna ilo jeho priebeh, i ke skúška bola týmto nepríjemne
                                  ovplyvnená. Po as nastavovania svetiel sa dozvedám od p. Letenaja o stále prítomnej
                                  existencii Maleninho súbore v súbore a o tom ako Bralen údajne kon í - ako to zo šatne
                                  prepo ula p. Letenajová. Tieto slová mi len potvrdzujú bezcharakternos , s ktorou
                                  Malenovská verejne šíri klebety a poškodzuje Tane né divadlo Bralen.
                                  Samotné predstavenie prebehlo v poriadku a spolupráca s TKEJ sa ukázala ako pozitívna
                                  vo ba. Žia , TD Bralen sa svojim výkonom na javisku neprezentoval v dobrom svetle.

