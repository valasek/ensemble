- date_from: '2017-06-21'
  date_to:
  raw_header: Schôdza súborovej skupiny, AKS
  name: Schôdza súborovej skupiny
  location: AKS
  description: |-
    Duras: Na repertoárovom tréningu mi súbor vyjadril svoju
              nespokojnos . Po predošlej dohode s Martou som im pre ítal zoznam úloh, ktoré som v
              januári dostal od p. Letenaja a argumentujem, že tieto úlohy (a niektoré navyše) som si
              plnil zodpovedne a svedomite. Dohodli sme sa tiež, že po odchode Vrbi anovej bude
              repertoárové tréningy vies M. Mešťaníková - ako to bolo aj v mojej predstave. Okrem
              iného tiež súbor vyzývam k spolo nej výpomoci pri jeho vedení. Vzniká dohoda ku ktorej
              sa pripájajú M. Meš aníková, J. Va o a D. Malenovská. Za iatok formovania novej Rady
              súboru.
- date_from: '2017-06-27'
  date_to:
  raw_header: Stretnutie T. Durasa a D. Malinovskej
  name: Stretnutie T. Durasa a D. Malinovskej
  location:
  description: |-
    Duras: Stretnutie, na ktoré ma volala Malenovská pri om nenazna ila,
              že by sa stretnutia mali zú astni viacerí. Po príchode sú na mieste stretnutia (vo vinárni)
              aj J. Vaľo a M. Mešťaníková. Na stretnutí sme sa rozprávali o predstavách ako by sme
              mohli fungova . Prvýkrát po ujem názov skupiny, pod ktorou Malena organizuje svoje
              tane né aktivity (vystúpenia na beániách, natá anie na prijímací pohovor) - Noir Dance
              Company. Potvrdzuje, že by rada viedla svoju skupinu, ktorá by mohla fungova pod
              strechou TD Bralen. Pod a predbežnej dohody by M. Mešťaníková bola zodpovedná za
              nácvik starých choreogra í Bralenu, J. Vaľo by sa venoval marketingu a Malenovská by
              zastrešovala komer nú sféru súboru a novú tvorbu. Po as stretnutia i po om som sa
              nevedel zbavi pocitu, že ide o snahu vyšachovať ma z vedenia. U ahujem sa do mierneho
              ústrania v úmysle vypo u si a vyzisti predstavy kolegov a spoji ich s vlastnými.
                      Po spolo nom stretnutí sme sa s Martou presunuli do Bralenu, kde sme p.
              Letenaja informovali o dianí. S predstavou dvoch súborov pod jednou hlavi kou
              nesúhlasil, vyjadril myšlienku možnej spolupráce dvoch odlišných súborov, nie však pod
              jednou strechou.
