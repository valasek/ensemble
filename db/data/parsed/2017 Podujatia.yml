year: 2017
year_description: |-
  ROK 2017
                                                            (42. rok existencie)

            Najdôležitejšie podujatia tohto roku:

            18.1. 2017          Schôdza, AKS
                                Schôdza, na ktorej R. Letenaj vytvoril novú funkciu - vedúceho
            súborovej skupiny. Je ním Tomáš Duras. Rasťo prečítal úlohy, ktoré by mal vedúci robiť.
            Do konca tejto sezóny ešte bude pracovať R. Letenaj a T. Duras mu bude pomáhať a od
            septembra bude pracť T. Duras a R. Letenaj bude pomáhať jemu. Predstava je taká že od
            roku 2018 bude pracuvať Tomáš samostatne. Budúcnosť ukázala, že to celkom nevyšlo.

            24.4. 2017           Happening tanečních konzervatoří, Švandovo divadlo, Praha
                                 Vo Švandovom divadle sa konalo predstavenie Happening tanečních
            konzervatoří, na ktorom Bralen vystúpil ako hosť. J&R Letenajovci v Prahe neboli. Na
            tancovanie braleňákov vyšla v ČR dosť negatívna kritika

            27.4. 2017           Posledný repertoárový tréning R. Letenaja
                                 Dnes sme mali so súborom náš posledný repertoárový tréning.
            Predstavenie v Prahe hodnotil Tomáš a braleňáci hovorili svoje dojmy. Rasťo oznámil, že
            repertoárové tréningy od dnes už bude organizovať Tomáš, obsadenia do tancov určuje
            tiež on a tance zo starého repertoáru, ktoré by mali ísť pred divákmi, chce pán Letenaj
            pred predstavením vidieť a schváliť, či to môže ísť na javisko.

            6.9. 2017           Odovzdanie súborovej skupiny Brade, AKS
                                R. Letenaj privítal všetkých v novej sezóne a odovzdal súborovú
            skupinu novému vedeniu: Duras, Malenovská, Mešťaníková a Vaľo.
            Duras: Prvý tréning v 43. sezóne, na ktorom sme súboru predstavili nové vedenie štvorice
            Duras, Malenovská, Meš aníková, Va o a oboznámili ich s plánmi do sezóny, o našich
            predstavách, letných stretnutiach i fuknciách, ktoré by sme mali v rámci vedenia
            vykonáva s dodatkom, že ni nie je do kame a vytesané.

            8.11. 2017           Stretnutie R. Letenaja so súborom, AKS
                                 Hodnotenie predstavenia a návrh Rasťa na riešenie zlej komunikácie
            medzi súborom, Tomášom a “zbytkom” Brady. Duras: Zhodnotenie VMT so súborom a
            následné pripomienkovanie súboru v zastúpení Grachovej o nezhodách v Rade súboru a
            spolo nej komunikácii. Pri vypo utí týchto pripomienok som si uvedomil, že sú mi
            pripisované aj mnohé chyby, ktoré v kone nom dôsledku nimi priamo nie sú. Beriem si
            však zo stretnutia jedno dôležité - treba zlepši svoju i spolo nú komunikáciu.
            P. Letenaj nám za návrh predkladá štyri možné riešenia: 1/ zbohom, 2/ lotéria, 3/ zmena,
            4/ perspektíva




