year: 2000
year_description: |-
  ROK 2000
                                          (25. rok existencie)
       Najdôležitejšími faktami roku 2000 z pohľadu vývoja TD Bralen boli:
                    -   odchod časti súborovej skupiny do muzikálov v bratislavských divadlách
                    -   prechod časti členov 4. ročnika do súborovej skupiny
                    -   nácvik kmeňového repertoáru novou súborovou skupinou
                    -   25. výročie vzniku TD Bralen
                    -   organizácia Letnej školy tanca v spolupráci s SOUCH Slovnaft
                    -   realizácia domácich a zahraničných zájazdov
                    -   skvalitnenie reklamných aktivít TD Bralen v prospech jeho sponzorov
                    -   rekonštrukcia priestorov súboru v Apollo klube Slovnaft
                    -   začiatok práce na novom premiérovom programe
              Ako už po niekoľkýkrát, neodolala časť interpretov súborovej skupiny možnosti
       pôsobenia v muzikáloch uvádzaných v Bratislave. Z jednej strany potešujúce na tomto
       jave je, že výkony tanečníkov vychovaných v Bralene sú ozdobou ktoréhokoľvek
       muzikálu, v ktorom pôsobia. Z pohľadu súborovej práce znamená takýto odchod začiatok
       tvrdej práce s novými tanečníkmi z našich prípravných skupín. Obmedzené sú i možnosti
       práce na novom repertoári a všetko úsilie je zamerané na doštudovanie kmeňového
       repertoáru a zvýšenie technickej úrovne nových tanečníkov. Tento raz sa nám podarilo
       uskutočniť túto výmenu bez toho, aby sme museli obmedziť v podstatnej miere
       predstavenia a kontakt s divákom. To bolo možné len vďaka tanečníkom, ktorí zostali a
       prezieravej skladbe repertoáru v minulosti.
              Oslavy 25. výročia vzniku súboru vyvrcholili dvoma predstaveniami. Prvé bolo
       venované naším sponzorom a tanečnej verejnosti. Uskutočnilo sa na scéne historickej
       budovy Slovenského národného divadla. Druhé predstavenie bolo uvedené v Dome
       kultúry Zrkadlový háj a bolo venované všetkým bývalým i súčasným členom súboru.
              K činnosti TD Bralen už neoddeliteľne patrí organizácia víkendových tanečných
       seminárov a Letnej školy tanca pre širokú verejnosť. Každoročne záujem o tieto podujatia
       rastie a priestory súboru už nestačia. Preto sme v tomto roku po prvýkrát zorganizovali
       Letnú školu tanca v priestoroch Stredného odborného učilišťa v Slovnafte. Vyhovujúce
       prostredie (veľká telocvičňa, ubytovanie, plaváreň), pedagógovia, skúsenosti
       z predchádzajúcich ročníkov, značka TD Bralen a oduševnelý prístup vedenia SOUCH
       nám umožnili zrealizovať podujatie, ktoré smelo môžeme porovnávať so špičkovými
       podobnými podujatiami v Európe.
             V jubilejnom roku 2000 sme zvýšili dôraz i na prezentáciu súboru a jeho sponzorov.
       K výročiu sme vydali reprezentačný propagačný bulletin a po prvýkrát sme poďakovali
       sponzorom a spolupracovníkom i bildboardovou kampaňou. Podarilo sa nám v spolupráci
       s rmou NUBIUM rozmiestniť ďakovné velkoplošné reklamné pútače v 95 mestách
       Slovenska. V závere roka sme vyrobili i exkluzívne kalendáre TD Bralen s poďakovaním
       sponzorom.
         Rok 2000 je rokom, v ktorom všetky médiá informovali o činnosti súboru v rozsahu,
  aký v histórii súboru sme doteraz nezaznamenali.
        Počas letných prázdnin sa nám vďaka pomoci nášho ganerálneho sponzora
  Slovnaft podarilo zrealizovať rekonštrukciu naších priestorov v Apollo klube na
  Súkenníckej ulici. Získali sme tak krásne a účelné priestory ná nácviky a oranizačnú prácu
  súboru.
         V druhej polovici roka sme mali už obnovený celý kmeňový repertoár a začali sme
  s prípravou nového programu. Ako prvú sme dokončili choreogra u českého choreografa
  Libora Vaculíka „Spomienky lístím zaviate“.
