    Po tomto predstavení boli zverejnené veľmi pozitívne kritiky:

    Veľké emocionálne choreogra cké predstavenie, alebo i “act de parler” (rozhovor),
    napriek fragmentárnym divadelným prvkom. Skutočne dramatické prevedenie.
                                                            Galina, režisérka divadla Variant

    Ja pri svojej práci prakticky neprichádzam do styku s tanečným divadlom, ale počas
    predstavenia som niekoľkokrát pomýšľal na to, že to zmením, pretože je priveľmi
    profesionálne. Pohyby, dej, k tomu vhodná hudba - bolo to jednoducho veľmi-veľmi
    pôsobivé.
                                  Helmut, zástupca rakúskeho Zväzu amatérskych divadelníkov

    Nevedel som si v podstate vôbec predstaviť, čo ma čaká. Myslím si teraz, že ak európske
    divadlo prestavujú gestá a tanec a ak má každý možnosť vymyslieť si k nim príbeh podľa
    vlastnej fantázie, potom je to niečo úžasné. V každom prípade som mal z toho pôžitok.
                                                      Dr. Hartmut Franz, starosta Rudolstadtu.

    DANCE THEATRE BRALEN - SONGS
    „ Figurála lyrika"

    Festivalová cena za úžasné predstavenie bez potreby konkrétneho názvu patrí
    bezpochyby geniálnemu tanečnému divadlu zo Slovenskej republiky. Za skromným
    názvom sa však ukrýva brilantné tanečné divadlo mimoriadnej kvality.

    Vhodné dávkovanie prvkov klasického baletu a výrazového tanca, kostýmy najmä v
    pastelových farbách, výrazná hudba rôznych kultúr a bodová svetelná technika
    prezrádzajú premyslený koncept čiste fígurálneho predstavenia.

    Vhodne dávkované vysoké napätie medzi jednotlivými tanečníkmi a fyzická estetika, ktorá
    si zasluhuje pomenovanie poézia, vytvorili vrchol festivalu svojou krásou a perfektnosťou.

    Totálne odmietanie drsnosti, takmer asketická a bytostná elegancia, umožňovali divákovi
    nadchýnať sa jednotlivými obrazmi, ktoré sa v scénických predstaveniach zjavujú len
    veľmi zriedkavo.

    Svetlo, tóny a pohybujúce sa telá uchvátili diváka takmer archaickým spôsobom do takej
    miery, že každá ďalšia rekvízita by bola zbytočná a pôsobila by vyslovene rušivo.

    Táto inscenácia sa čiastočne zaoberala tými istými medziľudskými témami ako niekoľko
    hodín predtým Senníková suita. Čo však tam pôsobilo ako ťažko stráviteľná cukrová
    poleva, získalo tu svojou hľbkou omamnú, no prirodzenú sladkosť.

    Fantázii tu bol poskytnutý dostatok voľného priestoru, videné náznaky bolo možné
    interpretovať ako vlastné obrazy, stali sa zrozumiteľnými a poskytovali pôžitok.

    Vyhranený koncept, tvrdá práca, prísna disciplína, výborné využitie priestoru, ovládanie
    tela, primerané napätie a inteligentné využitie osvetlenia scény vytvorili kompaktnú
    inscenáciu. Takýmto vyspelým dielom by sa malo inšpirovať nejedno profesionálne
    divadlo, takéto predstavenie dávajú divadelným festivalom zmysel.

                                                             Úvahy Martina S. v DA CAPO '99

