year: 2016
year_description: |-
  ROK 2016
                                       (41. rok existencie)

  Najdôležitejšie podujatia tohto roku:

  14.1. 2016        Prvý repertoárový tréning, AKS
                    Okrem tréningu R. Letenaj oznámil súboru, že o dva roky ide do
  dôchodku a že si majú braleňáci vybrať zástupcov, ktorí sa začnú učiť ako viesť súbor

  23.4. 2016          Večer moderného tanca, Malá scéna, Zlín
                      Spoločné vystúpenie Bralenu a Dancing people H. Vaškovej.
  Tancovali sme: “Stolička”, “Boogie”, “Otec Smútok”, “Karant”. A. Vrbičanová sa
  nezúčastnila predstavenia a bolo to žiaľ aj vidieť. Zle zatancované predstavenie.

  7.5. 2016          Stretnutie Rady súboru “Brada” s RL, AKS
                     vyhodnotenie práce Brady a ďalšie námety na jej činnosť. Brada: M.
  Šeďová, A. Vrbičanová, K. Čaplová a T. Duras

  29.5. 2016          Večer moderného tanca, DK ZH, Bratislava
                      TD Bralen a Balet Bohemia. Pekné predstavenie. Bralen tancoval:
  “Karant”, “Máš veľa keď sa máš kam vrátiť (Mesto)” - premiéra, “Cesta je nádej, nádej je
  cesta”.

  4.7. 2016            Kniha 40 rokov TD Bralen, AKS
                       Nora Nosterská nám doniesla knihu o Bralene k 40. výročiu. Boli sme
  veľmi sklamaní, neakceptovala ani jednu našu pripomienku. Knižka po grafickej stránke
  pôsobí smutne až deprimujúco, text je v mnohých prípadoch nečitateľný , dodanie po
  termíne a aj napriek tomu, že peniaze zohnala Nosterská je to nevyužitá príležitosť urobiť
  niečo výnimočné.

  17.9. 2016          Stretnutie Brada, AKS
                      Rada súboru - M. Šeďová, K. Čaplová, A. Vrbičanová a T. Duras cez
  Skype. R. Letenaj vyjadril nespokojnosť s ich doterajšou prácou najme za nízku aktivitu,
  bez nápadov a snahy priniesť niečo nové.

  23.10. 2016         Festival Free fall, Praha
                      Vystúpenie TD Bralen na festivale Free fall v Prahe. T. Duras svietil, A.
  Vrbičanová robila priestorovú skúšku, M. Mešťaníková mala na starosti kostýmy a L.
  Zaťková zabezpečovala lístky autobusom. Janka a Rasťo nešli - v rámci výcviku
  braleňákov a nestresovanie Rasťa.




