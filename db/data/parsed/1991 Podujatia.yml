  raw_header: TD Bralen - hosť I. ročníka medzinárodnej choreografickej
  name: TD Bralen - hosť I. ročníka medzinárodnej choreografickej
  location:
  description: |-
    súťaže v Pordenone, Taliansko
         "Ani nie po dvoch dňoch, čo sa TD Bralen vrátilo zo zájazdu po východnom pobreží
         U.S.A., opäť balilo rekvizity a kostými na ďalšiu cestu. Tentokrát do talianskeho mestečka
         Pordenone, kde Le Studio Movimento e Musica organizovalo prvú medzinárodnú
         choreografickú súťaž, I. Concorso internazionale di coreografia, venovanú pamiatke
         slávnej anglickej primabaleríne Margot Fonteyn. Na tomto podujatí vystúpilo TD Bralen
         ako hosť vo finálovom galaprograme."

          ..." Napriek tomu, že na tomto podujatí zaplatili organizátori nováčkovskú daň
    (organizačné a technické nedostatky), určite sa im podarilo položiť základný kameň novej
    akcii, na ktorej v budúcnosti dostanú príležitosť najmä mladé začínajúce skupiny..."
    Úryvok z článku: "TD Bralen v Pordenone", (J. Kekeňáková), uverejnený v TL č.: 7/ 91.
    Cestu sme absolvovali dvoma osobnými autami R. Letenaja a S. Horvátha
          Zoznam účastníkov, členov TD Bralen:
