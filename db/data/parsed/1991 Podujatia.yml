  raw_header: Memoriál Robina Howarda, SND, Bratislava
  name: Memoriál Robina Howarda, SND
  location: Bratislava
  description: |-
    V Londýne sa memoriál konal v apríli 1990. V Prahe, v rámci festivalu
    Tanec '91, 22. 6. 1991 v divadle "K" sa konal spomienkový večer pri príležitosti druhého
    výročia smrti tejto významnej osobnosti. Podieľali sa na ňom domáce tanečné skupiny i
    zahraničné. Pozvanie prijalo aj Howardové Londýnské tanečné divadlo, London
    Contemporary Dance Theatre.
    V bratislavskom SND sa 1.7. 1991 konalo benefičné predstavenie, na ktorom sa
    predstavilo TD Bralen, (Nové renesančné tance a Na Bacha), Balet SND a ako hosť
    vystúpil London Contemporary Dance Theatre. Výťažok z predstavenia bol venovaný ako
         základ fondu, ktorý bude podporovať štúdium tanečníkov zo Slovenska na London
         Contemporary Dance School.

                                        Memoriál Robina Howarda
                                         1.7. 1991, SND, Bratislava

              1. Na Bacha                                   tancuje: TD Bralen
              2. Nové renesančné tance                      tancuje: TD Bralen
              3. Pas de “kufor”                             tancuje: Balet SND
                                     - prestávka -
              4. Interlock                                  tancuje: LCDT
              5. Forest                                     tancuje: LCDT

         Kto bol Robin Howard?
               ..."Svojou humánnosťou a trpezlivosťou vytvoril neopakovateľný model tolerancie,
         zbližovania národov a kultúr. Aj keď sídlil v Londýne a osud, ktorý ho pripravil o obe nohy
         sa pokúsil prikovať ho na jedno miesto, precestoval celý svet. Koncom 60-tych rokov
         založil svetoznámy London Contemporary Dance Trust, ktorého súčasťou sa stala Škola a
         divadlo, London Contemporary Dance School a London Contemporary Dance Theatre.
         Od roku 1970, keď bol s londýnskym divadlom prvýkrát v našej krajine, neprerušil s ňou
         kontakt do poslednej chvíle svojho života.
               Jedenásty deň roku 1989 dotĺklo jeho šľachetné srdce, ktoré nedokázalo nikdy
         sklamať priateľov, či desiatky najbližších, alebo tisícky takých, s ktorými ho spájalo
           uidum spoločných záujmov ideálov, a s ktorými žil pře neustále sa rodiaci a meniaci
         zázrak tanca.
               Robin Howard viackrát navštívil našu krajinu a bol oficiálnym hosťom MTT '89. V
         tomto období svojím odchodom zo všetkých funkcií v London Contemporary Dance Trust
         práve uzatváral jednu kapitolu vo svojom živote a s typickým elánom i bezhraničnou
         angažovanosťou hľadel v ústrety svojej ďalšej životnej úlohe. Chcel totiž využiť svoj čas a
         medzinárodnú autoritu na utvorenie nevládnej organizácie, ktorej cieľom by bolo
         prostredníctvom tanca prispievať k zbližovaniu národov a kultúr východu a západu. Na
         umiestnenie medzinárodného tanečného centra, ktoré málo byť súčasťou takéhoto
         projektu, uvažoval s Prahou, alebo Bratislavou.
               Robin však odišiel a nechal po sebe miesto, ktoré asi dlho ostane prázdne. Už
         neuvidíme jeho veľkú šedivú hlavu vyčnievať ponad ostatné, už nenahliadneme do jeho
         pokojných, láskavých očí, skrývajúcich múdrosť starca i hravosť dieťaťa. Iste by sa hneval,
         keby videl slzy, ktoré sa nám tlačia do očí a pokúsil by sa žartom zľahčiť definitívnosť
         rozlúčky....
         (z článku Petra Hrozienčika "Za Robinom Howardom" Rytmus č. 9/ 89)
