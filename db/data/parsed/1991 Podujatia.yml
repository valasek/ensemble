  raw_header: pondelok                        odchod účastníkov
  name: pondelok                        odchod účastníkov
  location:
  description: |-
    Aj tohtoročný festival poskytol bohatú tanečnú nádielku rôznych zaujímavých
    skupín. Jeho program pozostával zo šiestich komponovaných predstavení, z ktorých
    jedno bolo venované oslavám 20-ročnej existencie moderného tanca na Slovensku, zo
    šiestich praktických seminárov s hosťujúcimi pedagógmi, z videoprojekcií a
    spoločenského večera.
          "...Festival bol opäť šancou vidieť desiatky tanečných predstavení a možnosťou
    porovnať naše tanečné umenie so svetom. Príležitosťou pre vznik nových pracovných
    kontaktov, nových priateľstiev." (úryvok z článku Evy Gajdošovej "Konfrontácia so
    svetom" k IV. Festivalu moderného tanca Slovnaft '91, Kultúrny život 17.12. 1991).
          "...Organizovanie takéhoto festivalu je nad sily jedného amatérskeho súboru. Dnes
    však už nie sme na túto prácu sami, stále nachádzame viac a viac prívržencov a ľudí
    ochotných nám pomôcť pri realizácii týchto naších snov, predstáv a viery v to, že
    moderný tanec bude mať u nás raz také miesto, aké si zaslúži." (z rozhovoru s
    Rastislavom Letenajom, Tan-Tam 1/ 91 "Medzinárodný festival moderného tanca Slovnaft
    '91, J. Kekeňáková).
          Praktické semináre telocvičňa ZŠ Petržalka?:
                1. contemporary dans       - Claudine Tremeaux - Cie Ruue Matabiau (F)
                2. modern dance            - Curt Haworth (USA)
                3. Graham                  - Oľga Letenajová?
                4. Limón                   - Joe Alegado?
                5. contemporary dans       - Karin Potisk - Ricochet dance com., GB
