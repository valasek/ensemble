  raw_header: Zájazd do U.S.A.
  name: Zájazd do U.S.A.
  location:
  description: |-
    ("Spomienky na Ameriku", článok uverejnený v Tanečných Listoch č.
    8/ 91).     "Bralen stále hľadá. Chápe moderný tanec ako spôsob sebavyjadrenia
    moderného človeka, spôsob komunikácie, obohatenie vnútorného sveta svojich divákov.
    Jeho umelecká trasa vedie k tanečnému divadlu. Hodiny driny v tanečnej sále v Apollo
    klube Slovnaft, cesty po domácich a zahraničných scénach, kontakty, ktoré umožňujú
    Bralenu odovzdať a prijímať, posúvať sa na rebríčku umeleckej kvality stále vyššie. Bralen
    nie je lokálny fenomén. Vďaka nemu Slovensko už dávno prestúpilo svoje hranice.
    Moderný tanec Bralenu dokázal, že sú oblasti, v ktorých sme svetoví."

    (Večerník, 4.6. 1991, D. Machala). "Členovia TD Bralen svoju lásku k tancu podopierajú
    takmer absolútnou odovzdanosťou a nezištnosťou. Táto vnútorná disciplína im pomohla
    vyrásť k novej dimenzii ľudskej zodpovednosti. To je cesta ako kvalitným umením i
    ľudskými kvalitami zapisovať meno Bratislavy a Slovenska do mapy sveta!"

         Repertoár TD Bralen, uvedený na zájazde: Nové renesančné tance, Tracy, Križovatka
    Manhattan, Ebony concerto, Hlasy, Putá, Duch mora, Na Bacha, Zápisnice dôverné,
    Largo, Reminiscencie.

