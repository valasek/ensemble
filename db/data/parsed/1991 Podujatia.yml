  location: Bratislava
  description: |-
    Hostia - budúci profesionálni tanečníci z bratislavského Tanečného
    konzervatória na Gorazdovej ulici v Bratislave.
         Tento Večer moderného tanca bol výnimočný tým, že sa po prvýkrát predstavili na
    spoločnom javisku budúci profesionáli a nadšení "braleňácky" amatéri. O tom, že
    predstavenie málo nadpriemernú umeleckú úroveň svedčí o kvalitnom pedagogickom
    vedení v TD Bralen a o tom, že jeho tanečníci čiastočne dosahujú aj keď nie po
    technickej, ale najmä po výrazovej stránke úroveň profesionálnych tanečníkov.

                                             VMT
