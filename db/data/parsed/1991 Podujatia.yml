  name: XXVI. Večer moderného tanca, DK Ovsište
  location: Bratislava
  description: |-
    so švajčiarskou tanečnou skupinou Sinopia, ktorú založili v roku
    1984 dvaja tanečníci Baletu XX. storočia M. Béjarta, Etienne Frey a Jean-Claude Pavailli.
         "Sinopia nie je utópiou. Je realitou, súborom s pevnou tvárou, štyrmi stálymi členmi,
    technickým poradcom, majstrom svetiel a manažérkou. Za krátky čas sa jej členom
    podarilo realizovať svoje vlastné sny. Stálo to veľa práce, ale ako sami hovoria: "...je na
    nás, aby sme nikdy nestratili tú nezdolateľnú chuť tancovať, ktorá nás stále tak veľmi
    ženie vpred."
