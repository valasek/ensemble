              5. Malé x plus                              tancuje: Re ex
              6. Sentencie                                tancuje: M. Vojtek a.h., Re ex, Bralen
              7. Vaša obeť pre nás život znamená          tancuje: Tanečná skupina ĽŠU
              8. Kliky bé                                 tancuje: Bralen
                                   - Prestávka -
              9. Rock na vsi                              tancuje: VUS UK, Praha
              10. 12+1                                    tancuje: VUS UK, Praha
              11. Noc v Buchare                           tancuje: VUS UK, Praha
              12. Labyrint                       t        ancuje: VUS UK, Praha
              13. Finále                                  tancuje: VUS UK, Praha
