  name: 1. Večer moderného tanca
  location: ZK ROH CHZJD Vernosť
  description: |-
    Bol uskutočnený na základe spolupráce medzi súbormi Bralen,
         Re ex - (umelecký vedúci a pedagóg Ing. Juraj Šidelský), Tanečnou skupinou ĽŠU
         Obrancov mieru (umelecká vedúca a pedagogička Helena Žitňanová) a VUS UK
         (umelecký vedúci Jirka Rebec, pedagógovia Ivanka Kubicová a Ján Hartmann) Praha.
              Toto predstavenie je z hľadiska histórie moderného tanca veľmi dôležité, pretože ide
         o prvé celovečerné predstavenie tohto druhu v Bratislave. Ďalší význam je z hľadiska
         histórie súboru, pretože prvýkrát Bralen spoločne s Re exom zorganizoval takéto
         podujatie, čo bol dobrý štart do jeho ďalšej činnosti. Program:

                                       I. Večer modemého tanca
