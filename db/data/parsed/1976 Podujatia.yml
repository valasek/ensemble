year: 1976
year_description: |-
  ROK 1976
                                               (1. rok existencie)

       Najdôležitejšie podujatia tohto roku:

       13.3. 1976          1. Večer moderného tanca ZK ROH CHZJD Vernosť
                           Bol uskutočnený na základe spolupráce medzi súbormi Bralen,
       Re ex - (umelecký vedúci a pedagóg Ing. Juraj Šidelský), Tanečnou skupinou ĽŠU
       Obrancov mieru (umelecká vedúca a pedagogička Helena Žitňanová) a VUS UK
       (umelecký vedúci Jirka Rebec, pedagógovia Ivanka Kubicová a Ján Hartmann) Praha

       4.10. 1976          Návšteva Robina Howarda v Bratislave
                           Bola veľkou udalosťou pre život súbou. Znamenala nadviazanie
       priameho kontaktu s osobnosťou, ktorá v budúcnosti významne poznačila jeho ďalší
       vývoj. Robin Howard bol generálnym riaditeľom London Contemporary Dance Trust,
       zároveň priateľom Ivanky Kubicovej a Jána Hartmanna.




       19.12. 1976         1. Celoslovenská prehliadka choreogra í súborov
                           moderného tanca, Divadelné štúdio VŠMU, Bratislava
       "Stretnutie s moderným tancom", prehliadka organizovaná SUV SZM bola prvým
       stretnutím slovenských súborov moderného tanca, ktoré si navzájom skonfrontovali svoju
       prácu.




