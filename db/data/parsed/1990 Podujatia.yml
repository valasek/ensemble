           6. Križovatka Manhattan                    choreografia: Ján Hartmann
                “Four brothers”, “Blue champagne”, “Meet Benny Bailey”, “That’s killer Joe”,
                “To you”, “Another night in Tunisia”, “Poinciana”

                                     Večer moderného tanca
                        27.4. 1990, Aula des Hümmling - Gymnasiums Sögel

           1. Nové renesančné tance                   choreografia: Ján Hartmann
