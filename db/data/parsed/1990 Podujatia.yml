  raw_header: Zájazd TD Bralen do Emslandu, SRN
  name: Zájazd TD Bralen do Emslandu
  location: SRN
  description: |-
    V tomto termíne sa TD Bralen (25 členov) zúčastnilo zájazdu do SRN,
         ktorého základy sa položili na jeho prvom zahraničnom zájazde, na divadelnom festivale v
         Lingene. Pobyt organizoval pán Michal Hudi. Absolvovali sme 5 predstavení, 2
         celovečerné programy v Meppene a Sögli a 3 cca 60’ na gymnáziach v Meppene a
         Haselüne. Okrem predstavení odučila O. Letenajová pre nemeckých záujemcov hodinu
         moderného tanca a R. Letenaj jazzového. Po ceste domov sme sa zastavili v Bruchsale
         vo firme Zeta, popredného svetového výrobcu športových a tanečných trikotov, a dohodli
         formu spolupráce. Po tejto návšteve sme sa zastavili v Tübingene, kde sme si pozreli
         hodinu Joa Alegada a dohodli s ním návštevu v Bralene

    Zájazdový program: Na Bacha, Nové renesančné tance, Zápisnice dôverné, Duch mora,
    Križovatka Manhattan a Ebony concerto. Zúčastnilo sa 25 členov a mali sme 5
    predstavení.
                                   Večer moderného tanca
                    25.4. 1990, Aula des Windthorst - Gymnasiums Meppen

