         14. Križovatka Manhattan               tancuje: TD Bralen (26 min.)
                                - prestávka -
         15. Kontiki                            tancuje: Štúdio MT5 (8 min.)
         16. Monológ                            tancuje: Alfa (6 min.)
         17. Jaskyňa                            tancuje: Allegro (7 min.)
         18. Duet                               tancuje: Auriga (6:17 min.)
