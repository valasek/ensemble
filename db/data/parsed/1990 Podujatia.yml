  raw_header: Tanečné re exie II., DK Ružinov, Bratislava
  name: Tanečné re exie II., DK Ružinov
  location: Bratislava
  description: |-
    V poradí už 2. ročník "Tanečných re exií" (11.-15.7.) sa rozhodol DK
    Ružinov zorganizovať spoločne s TD Bralen a venovať ich oslavám 15. výročia jeho
    vzniku. Pozvanie na tento "mini festival" prijali Lines Dance Company z U.S.A., Tanečná

         skupina Paradogs zo Švajčiarska, ďalšia švajčiarska tanečná skupina Mobile Ballet Bern,
         pražská skupina Unia Nova a tak sa stali gratulantami TD Bralen.
              Posledné predstavenie patrilo "oslávencovi" a konalo sa na otvorenom priestranstve
         DK Ružinov. Toto predstavenie bolo pre tanečníkov Bralenu výnimočné a významné najmä
         preto, že ho zhliadli členovia London Contemporary Dance Theatre, ktorí chceli týmto
         svojou prítomnosťou prispieť k jeho oslavám. Podujatie bolo organizované DK Ružinov v
         spolupráci s Tanečnou dieľňou Bralen. Program vystúpení:
