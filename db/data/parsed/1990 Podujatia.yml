- date_from: '1990-07-09'
  date_to:
  raw_header: Dance ’90, Laterna magika, Praha
  name: Dance ’90, Laterna magika
  location: Praha
  description: |-
    Pražské kultúme stredisko už po druhýkrát usporiadalo v rámci
    Pražského kultúrneho leta medzinárodný tanečný festival "Dance ’90". Počas 12 dní v
    Smetanovom divadle a Laternej magike prebiehali tanečné programy domácich a
    zahraničných hostí. Spomeniem len niektoré: Balet du Grand Théatre de Geneve,
    Švajčiarsko, ďalšie švajčiarske súbory: CH Tanztheater, Paradogs, Mobile Ballet Bern,
    americká tanečná skupina Lines Dance Theatre, London Contemporary Dance Theatre a
    i. Z domácich skupín sa predstavili: sólisti štátneho divadla z Brna, TD Praha, Unia Nova a
    Uno z Prahy, košický súbor Tremolo a i.
          O vystúpení TD Bralen pani D. Beková v TL č. 8/ 90 napísala: "...Z našich souborů
    sem dále videla bratislavský Bralen. Jeho program dokládal rozmanitost repertoáru
    souboru. Nejsilneji mezi uvedenými působil kompaktní, dýchající "Duch moře" (chor.: Joe
    Alegado), prostořece plážové "Ebony concerto" Pavla Šmoka, zatančené velice živě,
    svěže a citlivě, a "Na Bacha" Kedzie Penfieldové. Ostatné choreografie uvedené na
    festivale: Križovatka Manhattan a Zápisnice dôverné.

                                            Tanec '90
                                9.7. 1990, Laterna magika, Praha

         1. Nové renesančné tance                   tancuje: TD Bralen
         2. Ebony concerto                          tancuje: TD Bralen
         3. Ether                                   tancuje: Eva Jeníčková
         4. Zápisnice dôverné                       tancuje: TD Bralen
                                   - prestávka -
         5. Duch mora                               tancuje: TD Bralen
         6. Na Bacha                                tancuje: TD Bralen
         7. Križovatka Manhattan                    tancuje: TD Bralen
              “Four brothers”, “Blue champagne”, “Meet Benny Bailey”, “That’s killer Joe”,
              “To you”, “Another night in Tunisia”, “Poinciana”
