  raw_header: Seminár s Matthew Hawkinsom, DK Ružinov, SND, Bratislava
  name: Seminár s Matthew Hawkinsom, DK Ružinov, SND
  location: Bratislava
  description: |-
    15 tanečníko TD Bralen absolvovalo niekoľko seminárov s anglickým
    pedagógom a choreografom, Matthew Hawkinsom v DK Ružinov a SND.
         M. Hawkins je absolventom tanečnej školy Royal Ballet a Arts Educational School
    London. Ako tanečník pôsobil v Royal Ballet v Covent Garden v Londýne. Neskôr prejavil
    záujem o moderný tanec, konkrétne o techniku M. Cunninghama, v spojitosti s princípom
    techniky klasického tanca.
