  raw_header: Tréning s Dan Wagonerom a predstavenie LCDT, AKS
  name: Tréning s Dan Wagonerom a predstavenie LCDT
  location: AKS
  description: |-
    Tréning s americkým pedagógom a choreografom Dan Wagonerom,
         toho času umeleckým vedúcim London Contemporary Dance Theatre v Bralene.
         Tento den bol pre členov TD Bralen mimoriadny, pretože jeho interpreti mali možnosť
         cvičiť s tak významnou tanečnou osobnosťou, akou je Dan Wagoner. Veľmi hodnotné bolo
         pre nich aj to, že na konci tréningu viedol málu diskusiu o predstavení TD Bralen, ktoré
         videl den pred tým v DK Ružinov. Večer navštívil celý súbor predstavenie LCDT v
         bratislavskom Istropolise.
