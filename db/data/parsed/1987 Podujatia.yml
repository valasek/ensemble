- date_from: '1987-11-15'
  date_to:
  raw_header: II. MFMT Slovnaft ’87, Divadlo pre deti a mládež, Trnava
  name: II. MFMT Slovnaft ’87, Divadlo pre deti a mládež
  location: Trnava
  description: |-
    nedeľa             Program Images (GB) a Tressera com. (F)

    Praktické semináre pre účastníkov viedli:
         13.11.   10:00-11:30     Kedzie Pen eld (USA) - kontaktné improvizácie
                  15:00-16:30     Bruno Genty (F) - moderný tanec
         14.11.   10:00-11:30     ? Ron Howell (GB) - moderný tanec
                  15:00-16:30     ?
         15.11    10:00-11:30     ? Jan Hartmann - (ČSSR) - jazzový tanec
                  15:00-16:30     ?

    Povedali nám:

    Doc. Dagmar Hubová, vedúca KTT HaTF VŠMU, Bratislava:
         "Usporiadatelia festivalu si zaslúžia uznanie i vďaku za myšlienku a realizáciu.
    Festival bol veľmi dobre pripravený, divácky atraktívny a priniesol rad hodnotných
    umeleckých impulzov..."

    Bernadette Bonis, redaktorka časopisu Dancer, Francúzsko:
         "Pozoruhodná akcia, výborná organizácia, skvelá atmosféra. Striedanie
    československých a zahraničných súborov umožnilo konfrontáciu rozličných umeleckých
    zameraní, čo pôsobilo na každého stimulujúco. Prekvapuje ma veľký počet amatérskych
    tanečných skupín vo vašej republike."

    Bemadette Iglich, sólistka a pedagogička Arc Dance Company, Veľká Británia:
         "Mala som možnosť zúčastniť sa na viacerých tanečných festivaloch vo Veľkej
    Británii i v zahraničí, ale musím priznať, že to, čo som prežila tu v Bratislave ma trochu
    zaskočilo. Váš festival predčil podobné podujatia výbornou organizáciou,
    koncentrovanosťou, atmosférou a mimoriadnou angažovanosťou všetkých
    zúčastnených."

    Sabrine Peck, choreografka, USA:
         "O tomto festivale som sa dozvedela na stretnutí s VUS UK v lete v roku 1987. Tak
    som sa rozhodla, že sa na ňom zúčastním. To, čo som mala možnosť vidieť ma doslova
    ohromilo. Z ničoho nič a zrazu taký neuveriteľný festival. Gratulujem!"

         TD Bralen počas troch festivalových večerov uviedlo choreogra e: “Na Bacha”,
    “Korzo”, “Ebony concerto”, “Putá” a “Nové renesančné tance”.
