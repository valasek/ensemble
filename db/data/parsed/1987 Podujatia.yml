  raw_header: Letný tanečný kurz v LCDS, Londýn, GB
  name: Letný tanečný kurz v LCDS, Londýn
  location: GB
  description: |-
    Toto podujate bolo poslednou výnimočnou akciou TD Bralen v tejto
    sezóne. Výnimočnou preto, lebo po prvýkrát v histórii súboru sa jeho interpreti zúčastnili
    ako frekventanti tanečného kurzu v zahraničí. Konkrétne to boli: Patrícia Samuhelová,
    Ivana Moravčíková, Verona Studená a Jana Kekeňáková. Denne absolvovali tréningy
    techniky M. Graham (spoločne s tanečníkmi z VUS UK) s Richardom Gainom, americkým
    tanečníkom a pedagógom, bývalým sólistom Martha Graham Dance Company a techniku
    moderného a jazzového tanca s Robertom Northom, anglickým pedagógom a
    choreografom, toho času pôsobiaceho v Ballet Rambert.
          Patrícia Samuhelová úspešne absolvovala konkurz a bola prijatá na trojročné
    štúdium na London Contemporary Dance School. Tak sa stala 3. poslucháčkou v
    republike a 1. na Slovensku, ktorej sa pošťastilo vďaka talentu, kvalitnej pedagogickej
    príprave v TD Bralen, ale najmä, a to nemožno nespomenúť, vďaka dlhoročnej spolupráci
    a priateľských vzťahov vtedajšieho generálneho riaditeľa londýnskej školy a divadla
    Robina Howarda a vedenia Bralenu, študovať na jednej z najlepších škôl moderného
    tanca v Európe. Po ukončení štúdia sa však presťahovala do Kanady a tak jej
    pedagogické pôsobenie v súbore, s ktorým vedenie Bralenu pred začatím jej štúdia v
    Londýne počítalo, sa nikdy neuskutočnilo.
