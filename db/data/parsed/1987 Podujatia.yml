  raw_header: 2. MFMT Slovnaft ’87 v DK Ružinov, Bratislava
  name: 2. MFMT Slovnaft ’87 v DK Ružinov
  location: Bratislava
  description: |-
    zahraniční hostia:   Compagnie Philippe Tressera (Francúzko)
                                   Arc Dance Company (Veľká Británia)
                                   Nucleo Danza (Argentína)
                                   Images (Veľká Británia)
                                   Orkhema (Francúzsko)
                                   Kinder und Jugendballets (SRN)
                                   Kedzie Pen eld (USA)
              domáce skupiny:      Tanečné divadlo Praha
                                   Isadora Dance Group, Praha
                                   Súbor moderného tanca Tremolo, Košice
                                   Súbor moderného tanca Auriga, Bratislava
                                   ZUŠ Štefánikova ul., Bratislava
                                   Bralen, Bratislava

          "Keď sa v roku 1985 skupina, sústredená okolo súboru Bralen odhodlala
    zorganizovať I. Medzinárodný festival moderného tanca Slovnaft, viseli nad touto akciou
    mnohé otázniky. Výsledok však predčil aj tie najoptimistickejšie prognózy....
          "Zrodila sa tak akcia, ktorá umožnila konfrontáciu názorov a vývojových smerov
    tanca na domácej i zahraničnej scéne, umožnila porovnať prácu amatérov a profesionálov,
    sprístupnila vďačným divákom širokú škálu prác od drobných miniatúr, cez rozsiahle
    scénické kompozície...."
          "Druhý ročník festivalu moderného tanca Slovnaft '87 vychádzal z pôvodnej
    úspešnej koncepcie, ktorú však rozvinul po kvantitatívnej i kvalitatívnej stránke. Počet
    zahraničných súborov stúpol na šesť a popri Bratislave zhliadli festivalové programy aj
    diváci v Piešťanoch a v Trnave.... Zvýšila sa kvalita seminárov, ktoré opäť tvorili súčasť
    festivalu... ." (Rytmus č. ../87, Peter Hrozienčik, Helena Žitňanová).
          "Moderný tanec sa nie najľahšie prebíjal do diváckeho podvedomia... Najprv rozlet
    tohto žánru zahatávali, neskôr sa udomácňoval, no máloktorý zriaďovateľ vytváral
    súborom podmienky na činnosť oduševnene, veriacky. Hoci v dvojročnom intervale sa v
    Banskej Bystrici koná Celoslovenský festival, nemožno vyhlásiť, že by to postačovalo.
          Toho si bol vedomý súbor moderného tanca Bralen, ktorý pred dvomi rokmi založil
    tradíciu medzinárodného festivalu moderného tanca Slovnaft... Dnes sa dá povedať, že to
    bola z hľadiska podchytenia záujmu tanečníkov i odozvy publika investícia návratná..."
    (Pravda, 18.11. 1987, Matúš Polák)

         Čo hovorí Rastislav Letenaj? "Hlavnou úlohou a cieľom tohto podujatia bolo, aby
    sme získali diváka pre tento nový žáner tanca a aby mal čo najväčší dopad na amatérske
    súbory u nás.
         Prvý ročník sa nám pripravoval ťažko, mnohí nám neverili, či prídu diváci, či
    účinkujúce súbory budú na takej úrovni, aby zvládli celovečerné predstavenie... Myslím,
    že mnohé dokázal prvý ročník, no hlavne tento druhý, ktorý bol rozsahovo väčší...." (Ľud,
    Bratislava 11. 12. 1987, Jozef Vadovický).
