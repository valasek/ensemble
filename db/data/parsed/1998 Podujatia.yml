  date_to: '1998-09-29'
  raw_header: Porto Hydra (5), Grécko
  name: Porto Hydra (5)
  location: Grécko
  description: |-
    Medzinárodný tanečný festival v gréckom Porto Hydra.
    TD Bralen už po piaty krát hosťoval na prestížnom tanečnom podujatí, na ktorom patria
    jeho predstavenia medzi umelecké vrcholy. V rámci svojich 15 predstavení prezentoval
    najširšiu škálu tanečných schopností a umeleckých kvalít celého telesa. Aj tohtoročné
    mimoriadne úspešné hosťovanie a pôsobenie mu prinieslo pozvanie na účinkovanie
    v ďalšom, už 13. ročníku Festivalu.
- date_from: '1998-10-16'
  date_to: '1998-10-18'
  raw_header: Choreogra cká súťažná prehliadka ČR a SR, Olomouc ´98.
  name: Choreogra cká súťažná prehliadka ČR a SR
  location: Olomouc ´98.
  description: |-
    Aby sa tanečný súbor La Mosca z Košíc mohol zúčastniť na tomto
    podujatí s choreogra ou Rastislava Letenaja “Čakanie” na hudbu C. Clerensa, musel R.
    Letenaj vytvoriť aj povinnú choreogra u na hudbu Leoša Janáčka. Nakoľko bolo už len
    jedno miesto voľné v aute vytvoril Rasťo sólo - duet so sakom “O chvíľu budeme opäť
    spolu” v interpretácii Jany Kekeňákovej, za ktorú získal ocenenie - zvláštnu prémiu. Táto
    povinná choreogra a sa neskôr stala základom pre jeho veľmi úspešnú choreogra u pre
    TD Bralen “Spolu, ale každý navždy sám”
