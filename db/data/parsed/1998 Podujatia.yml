year: 1998
year_description: |-
  ROK 1998
                                     (23. rok existencie)

         Pri spätnom pohľade na rok 1998 niektoré javy a fakty mali dominantný vplyv na
  vývoj TD Bralen v tomto roku. Boli to najmä:

        - ukončenie prvej profesionálnej sezóny (jún 1998)

         - neúspech pri snahe o zabezpečenie dostatku nančných prostriedkov na ďalšiu
  profesionálnu sezónu

         - odchod časti profesionálnych tanečníkov do ekonomicky zaujímavejších
  projektov

        - obnovenie práce súboru na báze amatérskych tanečníkov

        - znovuvybudovanie súborovej skupiny a jej technickej úrovne

        - absolvovanie prestížnych zahraničných zájazdov do ČR, Poľska, USA, Rakúska a
  Grécka

        - naštudovanie nového premiérového programu TD Bralen s názvom Art Café

        - obnovenie súborového kmeňového repertoáru a jeho uvedenie v Slovenskom
  národnom divadle

         V roku 1998 TD Bralen potvrdilo svoju suverénnu pozíciu v kontexte slovenského
  tanca a tanečného divadla. Nedostatok nančných prostriedkov však odčerpal značnú
  časť energie vedenia divadla. “Standing ovation” po predstavení v Slovenskom národnom
  divadle dokumentujú vysokú umeleckú úroveň a širokú popularitu Bralenu. Ťažkosti pri
  prechode na stabilný profesionálny režim signalizujú možné problémy v roku 1999. TD
  Bralen však disponuje dostatočnou materiálnou základňou a ľudským potencionálom na
  vyriešenie akýchkoľvek ťažkostí.

  18.1. 1998         Celosúborová schôdza TD Bralen.

  20.1. 1998         Schôdza rodičov prípravných a súborovej skupiny s R. Letenajom
                     Z 51 rodičov členov 1. až 4. ročníka prišlo 12

  14.2. 1998           Vystúpenie, Roškotovo divadlo, Ústí nad Orlicí, ČR
                       1. zahraničná premiéra programu “Búrka”, choreografovia Bruce
  Taylor (USA), Cristina Perera (Argentína) a Libor Vaculík (ČR) v Městskom Roškotovom
  divadle v Ústí nad Orlicí.

  15.2. 1998         Vystúpenie, MD Zlín, ČR
                     2. zahraničná premiéra programu “Búrka” v Městkom divadle v Zlíne.



  15.6.1998            Schôdza súboru, AKS
                       na ktorej sa uskutočnila reorganizácia súborovej skupiny

  19.-29.6. 1998     Zájazd TD Bralen, Michigan, USA.
                     TD Bralen sa zúčastnilo (z pôvodne 13 účastníkov sa zúčastnilo 7: S.
  Beláková, J. Kekeňáková, Z. Herényiová, L. Konrádová, D. Strnad, R. Letenaj a O. Lenár)
  Medzinárodného divadelného festivalu v Michigane.

  24. - 30.8. 1998  Sústredenie novovytvorenej súborovej skupiny TD Bralen, AKS
                    Na tomto sústredení sme sa zamerali na tvorbu programu Art café a
  na program do Grécka. Učili O. Letenajová, J. Kekeňáková, L. Qvaša Kvasnicová a R.
  Letenaj.

  10.9. - 29.9. 1998   Porto Hydra (5), Grécko
                       Medzinárodný tanečný festival v gréckom Porto Hydra.

  14.11. 1998          Konkurz, AKS
                       do všetkých prípravných skupín a súboru. Prišlo 70 záujemcov, vzali
  sme všetkých

  22.11. 1998        Premiéra “Art Café”, Divadlo West, Bratislava
                     TD Bralen uviedlo slávnostnú premiéru komponovaného programu
  hudby, slova a tanca, na ktorej sa podielal Rastislav Letenaj námetom a scenárom, Peter
  Lipa so sprievodným slovom, Ján P. Oravec réžiou, B. B. King hudbou, R. Letenaj, D.
  Strnad a J. Kekeňáková choreogra ou a TD Bralen tancom.

  20.12. 1998         Večer moderného tanca, SND, Bratislava
                      Pro lový program TD Bralen venovaný generálnemu sponzorovi TD
  Bralen Slovnaft, ďaľším sponzorom, spolupracovníkom a priateľom. Bolo vypredané.
