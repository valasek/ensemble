  raw_header: II. Medzinárodná dieľňa komorného tanca “Artama”,
  name: II. Medzinárodná dieľňa komorného tanca “Artama”,
  location:
  description: |-
    Neubrandeburg, NDR.
         Bola organizovaná Zentralhaus fur Kulturarbeit v NDR ako pokračovanie jej I. ročníka v
         roku 1980. "Artama" bola "nahliadnutím do dielne" a výmenou skúseností v teoretickej i
         praktickej umeleckej práci medzi choreografmi a interprétmi jednotlivých súborov.
         Prispela tak k poznávaniu vývojových tendencií komorného tanca v európskych krajinách.
         Bralen sa zúčastnil tohto podujatia s choreogra ami: 6 tancov pre autu, Reminiscencie,
         Kliky bé, Nenechávaj ma samote a Largo, ktoré boli odborníkmi a divákmi ocenené pre
         vysokú choreogra ckú a interpretačnú úroveň. Celkovým účinkovaním súbor vzbudil
         záujem o svoju prácu, čo potvrdilo niekoľko pozvaní súboru k účinkovaniu v NDR,
         prehÍbenie spolupráce medzi Bralenom a nemeckými súbormi a pozitívnych ohlasov v
         tlači: " Slovenskí priatelia fascinovali publikum príspevkom "6 tancov pre autu" a
         "Nenechávaj ma samote", aby sme menovali len dva najatraktívnejšie príklady, pričom
         choreogra cké a tanečné výkony - a to sa nutne musí spomenúť - mali nadpriemernú
         úroveň.”
         ...."Keďže komomý tanec je aj výrazom vyspelej výkonnosti a prejavom kvali kovanej
         technicko-tanečnej a takisto pravdaže aj choreogra ckej spôsobilosti, mali by sme na
         slovenskom príspevku ešte raz zdôrazniť význam artistných (umeleckých) prostriedkov."
         ...„"Verím, že umelecká presvedčivosť a pôsobivosť príspevkov sa popri spomínaných
         dôvodoch rozvinie aj v ďalšej ich tvorbe. Dokonalá technika, ktorou interpreti disponujú a
         ktorá im umožňuje širokú výrazovú škálu, im zároveň dovoľuje možnosť identi kácie. Cítia
         sa v tomto v najlepšom zmysle modernom výraze aj ako mladí ľudia naších čias, a ak
         chcete, prihovárajú sa súčasne obsahom i formou...." ("Niekoľko úvah k medzinárodnej
         dielni Komomý tanec", Wemer Gommlich, Der Tanz, časopis pre amatérsky tanec 3/ 83).

