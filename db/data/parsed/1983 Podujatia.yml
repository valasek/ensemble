year: 1983
year_description: |-
  ROK 1983
                                          (8. rok existencie)

  Najdôležitejšie podujatia tohto roku:

  16.-23.2. 1983       II. Medzinárodná dieľňa komorného tanca "Artama" v
                       NDR.
  Bola organizovaná Zentralhaus fur Kulturarbeit v NDR ako pokračovanie jej I. ročníka v
  roku 1980. "Artama" bola "nahliadnutím do dielne" a výmenou skúseností v teoretickej i
  praktickej umeleckej práci medzi choreografmi a interprétmi jednotlivých súborov.

  3.6. 1983           VI. Večer moderného tanca, Nová scéna, Bratislava
                      Uviedli sme tance: Finále, Futbal, Priateľstvá, Reminiscencie a 6
  tancov pre autu.

  4.-5.6. 1983      Kedzie Pen eld v Bralene, AKS
                    Proslredníctvom VUS UK sa Bralen skontaktoval s americkou
  pedagogičkou a choreografkou, žijúcou v Škótsku, Kedzie Pen eld a absolvoval s ňou
  nesmierne zaujímavé hodiny.

  19.6.-3.7. 1983    Letný tanečný kurz v Drážďanoch, Nemecko
                     Oľga Letenajová, Rastislav Letenaj účastníci letného medzinárodného
  tanečného kurzu v Palucca Schule v Drážďanoch. NDR

  18.9. 1983          Premiéra program “Nálady”, Nová scéna, Bratislava

  14.-22.10. 1983     Školenie techniky M. Graham, Neubrandenburg, Nemecko
                      Ide o podujatie, organizované Zentralhaus fur Kulturarbeit der DDR,
  ktorého sa zúčastnila ako lektorka Oľga Letenajová. Viedla tréningy techniky M. Graham
  pre tanečníkov rôznych súborov moderného tanca v NDR. Tu bola vydaná jej práca:
  "Aplikácia techniky M. Graham vo výchove interpréta amatérskeho súboru", ktorej
  spoluautorom bol Ján Hartmann.




