  raw_header: Kedzie Pen eld po 1x v Bralene, AKS
  name: Kedzie Pen eld po 1x v Bralene
  location: AKS
  description: |-
    Proslredníctvom VUS UK sa Bralen skontaktoval s americkou
    pedagogičkou a choreografkou, žijúcou v Škótsku, Kedzie Pen eld a absolvoval s ňou
    nesmierne zaujímavé hodiny. Prvý krát sa tanečníci Bralenu zoznámili s kontaktnými
    improvizáciami, ktoré ich obohatili o spoznanie vlastných výrazových schopností. Na
    základe vzájomných sympatií naša spolupráca s ňou pokračovala i v budúcom období,
    cvičili sme improvizácie. Na uhradení nančných nákladov sa podielali všetci členovia.

