year: 2002
year_description: |-
  ROK 2002
                                     (27. rok existencie)

          Rok 2002 bol v histórii Tanečného divadla Bralen výnimočný vo veľkom rozkolísaní
  úrovne podmienok na prácu súboru. Celý rok bol ovplyvňovaný nančným zabezpečením
  činnosti a žiaľ, musím konštatovať, negatívne. Rok sme začali stratou 91.000.- Sk, z roku
  2001 a s prísľubom nášho generálneho sponzora, že jeho sponzorský príspevok bude
  poukázaný na účet TD Bralen už v januári. Pripísanie tohoto príspevku sa uskutočnilo až
  v júni a aj to v krátenej podobe z 1.000 000.- Sk na 700 000.-Sk a so zmenou, že z tohoto
  kráteného príspevku si hradíme nájomné a energie v priestoroch TD Bralen. Z toho
  vyplýva, že dotácia nášho generálneho sponzora sa oproti minulému roku znížila o 50%.
  Táto skutočnosť nás viedla k zavedeniu mimoriadnych opatrení v hospodárení TD Bralen,
  ktorých cieľom bolo zmobilizovať všetky ďaľšie zdroje a zavedenie účinných šetriacich
  postupov v celej prevádzke TD Bralen. Za najvýznamnejšie opatrenia spomeniem:
  pozastavenie vyplácania miezd interným pracovníkom, externým pedagógom,
  obmedzenie účasti na festivaloch a predstaveniach, vyžadujúcich náklady hradené
  z rozpočtu súboru, koncentrácia na akcie a podujatia, produkujúce zisk (Víkendové
  semináre a Letné školy tanca).
          Vďaka týmto opatreniam získaním ďaľších sponzorov a spolupracovníkov sa nám
  v druhej polovici roku podarilo vyvážiť zníženú dotáciu a.s. Slovnaft a môžem konštatovať,
  že koncom roka 2002 sa činnosť súboru vrátila do normálnych koľají. Bezpochyby za
  pozitívum považujem zvládnutie tlaku na predaj súborového mikrobusu, čo nám umožnilo
  realizovať predstavenia a účasť na podujatiach, ktoré by bez použitia vlastného
  mikrobusu, boli nereálne.
          Rok 2002 bol charakteristický i zaujatím pozície vo svete web a internetu. Naša
  profesionálna webovská stránka, na veľmi vysokej gra ckej úrovni a obsahovej stránke,
  sa objavila na zoznamoch všetkých väčších dostupných portálov, čím sa nám otvárajú
  nové možnosti získavania kontaktov a v neposlednej rade i propagácie ako súboru, tak i
  jeho podporovateľov.
          Z umeleckého hľadiska a dúfame, že i z pohľadu diváka môžem činnosť hodnotiť
  veľmi pozitívne, s udržaním umeleckého rastu, s dostatočným počtom predstavení a
  s výnimočným ohlasom odbornej kritiky.
          Pre už spomínanú nančnú stituáciu v prvej polovici roka, klesol počet predstavení
  z priemerného počtu cca 60, až o 1/3. V roku 2002 zrealizoval súbor 42 predstavení,
  z čoho 9 bolo na Slovensku a 33 v zahraničí. Z predstavení na Slovensku vyzdvihnem
  uvedenie novembrového galaprogramu na scéne Slovenského národného divadla
  v Bratislave, nakoľko toto predstavenie potvrdilo výnimočné postavenie TD Bralen vo
  svojom žánri.
          Zo zahraničných predstavení nesmiem vynechať zájazd na Medzinárodný tanečný
  festival do gréckeho Porto Hydra, na ktorom súbor absolvoval 22 predstavení a tohto
  festivalu sme sa zúčastnili už deviaty krát. Pre nančnú náročnosť tohto podujatia
  (hradenie leteniek z vlastného rozpočtu, vystúpenia bez nároku na honorár, organizátor
  hradí len náklady na pobyt), sme účasť na tomto podujatí, až do prípadnej zmeny
  podmienok, pozastavili. Za veľmi úspešné považujem pražské vystúpenia, na ktorých sa
  nám podarilo okrem divákov, výnimočne pozitívne osloviť i odbornú kritiku.
          Za pozitívnu črtu všetkých predstavení v roku 2002 považujem i javiská, na ktorých
  TD Bralen vystupuje, lebo vo väčšine prípadov ide o prvé scény tej, ktorej krajiny
  (Slovenské národné divadlo Bratislava, Národní divadlo Praha, Východočeské divadlo
  Pardubice, Národné divadlo v Novom Sade, Juhoslávia).
