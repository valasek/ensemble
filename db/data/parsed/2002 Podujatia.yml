  19.6.-13.7. 2002   Porto Hydra (9), Grécko
                     Posledná účasť na medzinárodnom tanečnom festivale „Porto
  Hydra 2002“ 22 predstavení, 16 účastníkov (12 interpretov a 4 netancujúci: R. Letenaj, P.
  Stránsky, K. Mániková a B. Hrozienčik). Pre stále sa meniace podmienky k horšiemu zo
  strany K. Constadinidis, sme sa rozhodli ukončiť túto spoluprácu.

  16.-22.10. 2002    Zájazd, Montevarchi, Taliansko
                     Hosťujúce vystúpenie v programe tanečnej školy Studio Caroline a
  pedagogické pôsobenie v tejto tanečnej škole, v talianskom meste Montevarchi.
  Účastníci: J. Kekeňáková, M. Klimešová, P. Kovalčík a R. Letenaj

  4.11. 2002       Slávnostný program TD Bralen, SND, Bratislava
                   Samostatný program venovaný a.s. Slovnaft a ďaľším
