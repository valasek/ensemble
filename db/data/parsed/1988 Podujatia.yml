    "Scénická žatva" - festival divadla - patrí medzi vrcholné prehliadky
    ochotníckeho divadla na Slovensku. Jeho už 66. ročníka sa Tanečné divadlo Bralen
    zúčastnilo prvýkrát. Prezentovalo sa v martinskom Dome kultúry s veľkým úspechom.
          ..."Nápaditá choreografía niektorých ukážok z ich tvorby s využitím syntetických
    javiskových prvkov naznačila, že ambície súboru Bralen po ucelenej javiskovej výpovedi
    nie sú nadsadené..." (úryvok z článku M. Rechtorisovej, uverejnený v Smene, dňa 2. 11.
    1988). Program večera pozostával z nasledovných choreografíí:
          1. Zápisnice dôverné
          2. Largo
          3. Temperamenty
          4. Kliky bé
          5. Ebony concerto

          Na tomto podujatí sa položil základ pre realizáciu najatraktívnejšieho zahraničného
    zájazdu v budúcnosti. Predstavenie totiž zhliadol pán Mičija Tanaka, riaditeľ japonského
    festivalu amatérskeho divadla a odvtedy sa snažil o získanie Bralenu na toto podujatie.
