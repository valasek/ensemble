year: 1988
year_description: |-
  ROK 1988
                                      (13. rok existencie)

  Najdôležitejšie podujatia tohto roku:

  30.-31.1. 1988      Sústredenie s Evou Jeníčkovou
                      Začala stavať Zápisnice dôverné

  8.2. 1988           Prvý tréning s Joe Alegadom

  28.4. 1988          XV. Večer moderného tanca, DK Ružinov
                      Hostia: Auriga a David Appel z USA

  30.4. 1988          Stretnutie súborov MT, DK Dúbravka, Bratislava
                       Toto podujatie patrilo medzi výnimočné. Prvýkrát sa totiž na
  nesúťažnej prehliadke stretli popredné bratislavské súbory moderného tanca, Alfa, Auriga,
  Prens a Bralen, a spoločne vystúpili v programe, nazvanom "Stretnutie". Ako hosť
  programu sa predstavilo Štúdio komorného tanca Evy Blažíčkovej z Prahy.

  11.6. 1988         Mestská súťažná prehliadka moderného tanca, DK Ružinov
                     TD Bralen predstavilo nové choreografie Evy Jeníčkovej "Zápisnice
  dôverné" (hudba: africká ľudová), Rastislava Letenaja “Putá" (hudba: Phillip Glass)

  2.-7.7. 1988        Letná škola tanca Vladimíra Buryana, Skryje u Brna
                      R. Letenaj učil 1. x, v kultúrnom dome v Tišnovskej novej Vsi, jazz 2x
  denne

  1.9. 1988           Patrícia Samuhelová odcestovala do Londýna
                      Na štúdijný pobyt do London Contemporary Dance School

  9.9.- 17.9. 1988    Medzinárodný divadelný festival, Lingen, Nemecko
                      3 predstavenia v Sögeli, Papenburgh a Lingen, 18 členov

  5.10. 1988           Spoločné predstavenie Bralenu a pražského súboru Unia
                       Nova, Dom umenia, Piešťany

  17.10. 1988          TD Bralen - hosť Scénickej žatvy '88, Martin
                       "Scénická žatva" - festival divadla - patrí medzi vrcholné prehliadky
  ochotníckeho divadla na Slovensku. Jeho už 66. ročníka sa Tanečné divadlo Bralen
  zúčastnilo prvýkrát.

  28.-30.10. 1988     6. Celoslovenský festival moderného tanca, Banská Bystrica

  1.12. 1988          Zmena názvu súboru na Tanečné divadlo Bralen
