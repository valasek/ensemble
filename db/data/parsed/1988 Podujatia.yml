  raw_header: MTT '88, Divadlo Bráník, Praha
  name: MTT '88, Divadlo Bráník
  location: Praha
  description: |-
    Skupina moderného tanca VUS UK zorganizovala z príležitosti
         Medzinárodného dňa tanca (29.4) medzinárodnú prehliadku moderného tanca pod
         názvom "Mezinárodní týden tance (MTT '88). Medzi účastníkmi ako: Helder de Carvalho,
         Francúzsko, David Appel USA, sólisti Štátneho divadla z Brna, sólisti Laternej magiky ND
         z Prahy, Štúdio komorného tanca Evi Blažíčkovej, Pražský komorný balet Pavla Šmoka,
         súbor GITIS z Moskvy, Re ex Dance Company, Veľká Británia, vystúpil Bralen ako hosť s
         choreografiami: "Nové renesančné tance, "Na Bacha"a "Putá".

                                                   MTT’88
                                      20.4. 1988, Divadlo Bráník, Praha

              1. Améba                        tancuje: Skupina scénického tance KDP, Rebec
              2. Putá                         tancuje: Bralen
              3. Adagio                       tancuje: Skupina scénického tance KDP, Rebec
              4. Dance du cobra               tancuje: Helder de Carvalho
              5. Nové renesanční tance        tancuje: Bralen
              6. Raining Tiny Dances          tancuje: David Appel
              7. Na Bacha                     tancuje: Bralen
              8. Furrawn                      tancuje: David Appel

               Choreografiu "Nové renesančné tance" ohodnotil V. Malcev v Rudom Práve 11.5.
         1988, kde napísal: "Vysoce hodnotím kompozici "Nové renesanční tance" v podání
         bratislavského Bralenu, s jehož sedmi členy je nastudoval kmenový choreograf VUS-u,
         Ján Hartmann. Na dosti rozsáhlé hudební ploše, kterou se prolíná historická hudba se
         současnými hudebními motívy, se Jánovi Hartmannovi podarilo optimálně skloubit prvky
         dobového tanečního stylu s prostředky soudobého tance.”
