year: 2003
year_description: |-
  ROK 2003
                                           (28. rok existencie)

             Aj napriek zložitejšej situácii vo nancovaní súborovej činnosti sa nám i v roku 2003
       podarilo udržať umeleckú činnosť, uviesť premiéru nového programu v Slovenskom
       národnom divadle, zrealizovať tri zahraničné zájazdy, zorganizovať Letnú školu tanca a
       množstvo seminárov v celej Európe. Odozva odbornej kritiky i diváckej obce na náš nový
       program bola fantastická a potvrdila správnu voľbu choreografov a ďaľších
       spolupracovníkov podieľajúcich sa na premiére.

              Do súborovej skupiny sme začlenili nových interpretov a podarilo sa nám uviesť
       úspešnú Akadémiu, na ktorej vystúpili všetci tanečníci našich prípravných skupín. Toto
       predstavenie poukázalo na výnimočnú kvalitu pedagogického procesu v našom súbore a
       spôsobilo, že záujem o prácu v našich skupinách prevýšil naše možnosti. Je to potešujúci
       fakt a dobrý základ pre budúcnosť súboru.

               Tanečná úroveň súborovej skupiny sa nám i v tomto roku podarila zvýšiť aj
       sústredeniami s tromi zahraničnými pedagógmi a choreografmi, a to: s Bruce Taylorom
       z Francúzska, Cristinou Pererovou z Brazílie a Joe Alegadom z USA. Spolupráca s tak
       výminočnými osobnosťami tanečného sveta, nielen že zvyšuje atraktivitu práce v súbore,
       ale i jeho preztíž smerom navonok.

              Výsledky práce TD Bralen v roku 2003 potvrdili súbor ako špičkové umelecké
       teleso vo svojom žánri a kolektív, na ktorý sa dajú klásť tie najvyššie profesionálne nároky.

       10.-18.3. 2003    Sústredenie s francúzskym pedagógom Bruce Taylorom, AKS
                         Bruce robil tréningy s 3., 4., 5., a 6. ročníkom a so súborom vytvoril
       choreogra u “Hviezda na mojom pravom ramene”

       4.-6.4. 2003      Tanečný festival, Burghausen, Nemecko
                         Zájazd TD Bralen na medzinárodný tanečný festival do nemeckého
       Burghausenu. Bralen uviedol “Slzy” a “Tres canciones”

       28.4.-7.5. 2003    Sústredenie s brazílskou pedagogičkou Cristinou Pererovou
                          Cristina robila tréningy s 3., 4., 5., a 6. ročníkom a so súborom začala
       stavať choreogra u “No more”

       19.5. 2003          Premiéra Human, DPOH, Bratislava
                           PREMIÉRA „Ľudia“ na scéne DPOH v Bratislave, na ktorej sa podieľali
       traja choreogra : Cristina Perera (Brazília) - “No more”, Bruce Taylor (Francúzsko) -
       “Hviezda” a Rastislav Letenaj (Slovensko) - “Human”

       14.10. 2003         Večer moderného tanca, DK ZH, Bratislava

       25.11. 2003       Vystúpenie, Divadlo Komedie, Praha, ČR
                         Vystúpenie TD Bralen a Tanečného divadla Antares v pražskom
       Divadle Komedie. Bralen uviedol tance “Hviezda” a “Human”

       28.-30.11. 2003     Krakowské baletné stretnutia, Krakov, Poľsko
