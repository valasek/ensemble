  raw_header: Festival mieru a priateľstva, Nemecko, Poľsko a
  name: Festival mieru a priateľstva, Nemecko
  location: Poľsko a
  description: |-
    Československo
    Bralen sa zúčastnil na tomto podujatí ako reprezentant československej ZUČ. Okrem
    československej delegácie, ktorú tvorili jeden tanečný pár bratislavského folklórneho
    súboru Ekonóm, folková skupina "Lokátoři" z Brna, Súbor piesní a tancov J. Vycpálka z
    Prahy a 6 členov súboru Bralen (O. a R. Letenajovi, M. Dohányos, V. Studená, J.
    Kekeňáková a I. Moravčíková). Festivalu sa zúčastnili súbory z Maďarska, Vietnamu,
    Bulharska, Rumunska, Mongolska, Ruska, Kuby a i. Všetky zúčastnené súbory vytvorili
    spoločný reprezentačný galaprogram, ktorý sa uviedol celkom štyrikrát a to v Paláci
    republiky v Berlíne, v hale Arena v Poznani, v Paláci kultúry v Drážďanoch a v krajskom
    divadle v Ustí nad Labem. Okrem týchto spoločných predstavení uviedla každá delegácia
    niekoľkokrát svoj samostatný program na trase Festivalu.
         Súbor Bralen sa predstavil nasledovnými choreografiami: "Kliky bé", "Fajnové
    odpoludnie”, "6 tancov pre autu" a časťou choreografie “Temperamenty".
