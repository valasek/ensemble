          Počas troch festivalových dní dýchal tanečnou atmosférou celý DK Ružinov. Vo foyer
    na niekoľkých televíznych monitoroch bežali tanečné filmy a profily popredných
    tanečných osobností, v informačnom stredisku členovia Bralenu prijímali skupiny,
    vypisovali programy na jednotlivé predstavenia a zabezpečovali plynulý chod celého
    festivalu. Vo veľkej sále DK prebiehali javiskové a priestorové skúšky tanečných skupín a
    v tanečnej sále zas semináre pre účinkujúcich tanečníkov s pedagógmi zahraničných
    skupín, ktoré viedli:
