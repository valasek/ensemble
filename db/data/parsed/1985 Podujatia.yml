  raw_header: Seminár v Bralene
  name: Seminár v Bralene
  location:
  description: |-
    Tréning s tanečníkmi francúzskeho divadla Helder de Carvalho a
    Anne Marie van Holden, 2 tréningy a video. Semináre boli pre súbor veľmi prínosné a
    poukázali na ďalšiu charakteristickú črtu činnosti Bralenu: hneď od začiatku svojich
    kontaktov so zahraničím sa snažil tieto využívať v prospech celého žánru. Toto stretnutie
    poznačilo v mnohých prípadoch moderný tanec na Slovensku až po dnešné dni.
    Návšteva francúzskeho súboru otvorila dvere vtedy ešte neznámemu francúzskemu
    tanečníkovi do diania moderného tanca u nás. Dnes už svojou prácou ovplyvňuje nielen
    amatérske súbory, ale aj poprednú scénu SND a je ním choreograf a pedagóg Bruno
    Genty.
