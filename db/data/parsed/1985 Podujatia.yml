  name: "- Helder de Carvalho"
  location: tanečník hosťujúceho súboru Ensemble de Vitry sur
  description: |-
    Seine.

    Pred vypredaným hľadiskom DK Ružinov sa predstavili každý večer jednotlivé tanečné
    skupiny v komponovaných tanečných programoch, pozostávajúcich z najlepších čísel.

         ..."Nebylo náhodné, že o organizační zajištení akce se postaral jeden z
    nejvýznamnějších amatérských souborů moderního tance na Slovensku, soubor Bralen..."

         …"Festival moderního tance byl proto logickým vyvrcholením systematické péče o
    zájmovou uměleckou činnost tohoto druhu v n.p. Slovnaft a zároveň součástí oslav 10.
    výročí vzniku souboru moderního tance Bralen..."

         ..."Domácí Bralen ve své nabídce zachytil spektrum své činnosti, od Letenajovy
    Přestávky a Puobišové Temperamentů, přes tanec choreografky Kedzie Penfield Na
    Bacha až k Hartmannovým choreografiím Korzo, Fajnové odpoledne a Reminiscence.
    Soubor ukazuje svým výkonem, že rozdílnost přístupu jednotlivých choreografů ho
    obohacuje v technice i výrazu a vytváří z něho těleso všestranného zaměření."

    .    .."Festival moderního tance jednoznačně potvrdil svou funkci, smysl i účel. Stal se
    nenahraditelným místem pracovního setkání a konfrontace uměleckých záměru souborů
    moderního tance, který je dosud u nás tak poskromnu zastoupen. Výsledky, předvedené
    na Festivalu Slovnaft ’85 napovídají, že správně orientovaný zájem na tomto poli tvůrčí
    činnosti spolu s vhodnou dramaturgickou a pedagogickou prací by mohly přinést nemalé
    úspěchy." (Taneční listy č.4/ 86, " I. Mezinárodní festival moderního tance Slovnaft '85"
    autor - pat)

         ...Prvý festival bol úspešný, organizátorom sa zámer predostrieť verejnosti moderný
    tanec v jeho najprogresívnejšej podobe vydaril. Preto je reálna nádej, že sa festival
    skutočne stane tradíciou." (Rytmus č.4/ 86, "Založili tradíciu?" autor - Juraj Šidelský).

         Úspech tohto podujatia ako po organizačnej, tak po umeleckej stránke naznačil, že
    termín "súbor moderného tanca" nie najlepšie vystihuje smer, ktorým sa Bralen chce v
    budúcnosti uberať. Vedenie Bralenu sa preto rozhodlo zmeniť jeho názov na Tanečné
    divadlo. Túto kategóriu zvolilo nie preto, že by sa už ním Bralen cítil, ale preto, že
    najlepšie vystihuje cieľ, ku ktorému sa chcel prepracovať.

