  raw_header: TD Bralen na MTT ’89, Palác kultúry, Praha
  name: TD Bralen na MTT ’89, Palác kultúry
  location: Praha
  description: |-
    Tak ako v roku 1988 aj v tomto, bolo TD Bralen pozvané Tanečným učilišťom UK k
    účinkovaniu na Medzinárodnom týždni tanca, MTT '89 do Paláca kultúry. V programe
    zloženom z choreogra í hostí: Karren Foster zo SRN, Brendy Edwards z Veľkej Británie,

    Ivanky Kubicovej, Libora Vaculíka, vystúpilo TD Bralen s jednou choreogra ou Evy
    Jeníčkovej: "Zápisnice dôverné”. Zúčastnilo sa 12 členov Bralenu.
         Hosťom MTT ’89 bol Robin Howard, ktorý videl predstavenie TD Bralen. Po skončení
    podujatia pricestoval do Bratislavy, kde sa na spoločnom stretnutí s vedením TD Bralen
    hľadala koncepcia spolupráce moderného tanca na Slovensku s londýnskou školou
    súčasného tanca.

         1. Marry Go Round                          tancuje: Karren Foster (NSR)
         2. Masky                                   tancuje: súbor Allegro (Bratislava)
         3. Maják                                   tancuje: Karren Foster (NSR)
         4. Sólo                                    tancuje: Brenda Edwards (GB)
         5. Requiem                                 tancuje: súbor Impulz (Praha)
                               - prestávka -
         6. Slunovrat                               tancuje: AUS Víta Nejedlého (Praha)
                               - prestávka -
         7. Metamorphosis                           tancuje: Györgyi Ligeti
         8. Zápisnice dôverné                       tancuje: TD Bralen
