  raw_header: III. Medzinárodný festival moderného tanca Slovnaft '89, DK
  name: III. Medzinárodný festival moderného tanca Slovnaft '89
  location: DK
  description: |-
    Ovsište, Bratislava
    Úspech predchádzajúcich dvoch ročníkov, ich prijatie divákmi i zainteresovanými
    odborníkmi inšpirovali TD Bralen a jeho spoluorganizátorov, k predsavzatiu založiť tradíciu
    pravidelných stretnutí tohto typu. Aj tento ročník bol doprevádzaný praktickými
    seminármi, prehliadkou videozáznamov a neformálnymi stretnutiami tých, ktorí sa upísali
    modernému tancu. Vrcholom podujatia bolo šesť celovečerných predstavení v DK
    Ružinov, v ktorých sa predstavili
         zahraniční hostia:    Tanztheater der Deutchen Post (SRN)
                               Landestheater Altenburg (SRN)
                               Bebe Ouali (Pobrežie Slonoviny)
                               The Imminent Dancer’s Group (Veľká Británia)
