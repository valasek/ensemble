  raw_header: Porto Hydra (1x), Grécko
  name: Porto Hydra (1x)
  location: Grécko
  description: |-
    Na počiatku bolo stretnutie vo Wuppertali a potom nasledoval 10-
         dňový pobyt v dovolenkovom centre Porto Hydra na Peloponézskom poloostrove.
         Rozsiahly hotelový komplex s dokonalýmí službami a športoviskami, v ktorom sa každé
         leto koná tanečný festival. Tentokrát hostil aj bratislavských tanečníkov TD Bralen.
               V am teátri, ktorý sa každý večer stal miestom "braleňáckych" vystúpení, zhliadlo
         predstavenia TD Bralen okolo tisícky divákov. Páčili sa im hlavne čísla kabaretného

    charakteru, Križovatka Manhattan, najnovší tanec Duch mora, ale aj stále úspešná
    tanečná groteska Kliky bé.
         Popri atraktívnosti dôležitou výhodou zájazdu bola bohatá javisková skúsenosť,
    ktorú interpreti nadobudli počas deviatich celovečerných predstavení.
         Uvedené choreogra e: Fajnové odpoludnie, Kliky bé, Largo, Reminiscencie, Na
    Bacha, Nové renesančné tance, Zápisnice dôverné, Rocková meditácia, Duch mora a
    Križovatka Manhattan.

         Zoznam účastníkov zájazdu:
             Bučková Janet                    Hrozienčik Peter
             Kekeňáková Jana                  Letenaj Rastislav
             Marcinčinová Katarína            Remenár Peter
             Šimková Ľubica                   Siváková Katarína
             Štefanová Denisa                 Steinhübel Ján
             Zonyga Jozef                     Studená Veronika
             Candráková Beata                 Feketeová Petra
