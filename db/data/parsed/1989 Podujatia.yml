- date_from: '1989-08-18'
  date_to: '1989-08-27'
  raw_header: VI. Internationale Sommer Tanzwoche Wien '89
  name: VI. Internationale Sommer Tanzwoche Wien '89
  location:
  description: |-
    Spolupráca s Joe Alegadom po jeho mesačnom pôsobení v TD
         Bralen neskončila a Joe vyhľadával každú príležitosť, aby súboru pomohol. Už niekoľko
         rokov totiž pôsobí ako jeden z najzaujímavejších a najatraktívnejších pedagógov
         tanečných kurzov vo Viedni, ktoré prebiehajú dvakrát ročne v Universität Sport Zenter. Na
         základe jeho dobrého mena a kontaktov s umeleckým šéfom Ismaelom Ivom zabezpečil
         týždenný kurz pre dve členky TD Bralen, Oľgu Letenajovú a Janu Kekeňákovú. Okrem
         tréningov techniky J. Limona s Joe Alegadom absolvovali tréningy s Miltonom Meyersom,
         americkým pedagógom a choreografom, toho času pôsobiacom v Alvin Ailey Dance
         Centre, ktorý vyučoval u nás nepoužívanú Horton techniku a bol ďalšou výnimočnou
         osobnosťou na kurze.
               Účasť na kurze bola pre TD Bralen veľmi prínosná z toho dôvodu, že Oľga
         Letenajová zaradila do pedagogického procesu výuku Limonovskej a Hortonovskej
         techniky.
