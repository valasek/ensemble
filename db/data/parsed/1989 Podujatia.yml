- date_from: '1989-05-11'
  date_to: '1989-05-18'
  raw_header: Mládežnícky festival, Wuppertal, SRN
  name: Mládežnícky festival, Wuppertal
  location: SRN
  description: |-
    V tomto termíne bolo TD Bralen vyslané prostredníctvom UV SZM na
    tanečný mládežnícky festival do Wuppertalu. Zúčastnilo sa ho vyše 500 účastníkov z 20-
    tich krajín sveta. Našu republiku zastupovali tri kolektívy, skupina Folk Team z Brna,
    Pantomimická skupina z Prahy a TD Bralen z Bratislavy. Predstavenia jednotlivých skupín
    (prevažne folklórneho zamerania) sa po celý týždeň konali na javiskách "pod holým
    nebom" po celom meste.

         Vyvrcholením festivalu bola Gala show v Mestskej hale, na ktorej účinkovali všetci
    účastníci. Každá delegácia mala vyhradený čas svojho účinkovania, cca 15. minút, ale aj
    napriek tomuto opatreniu predstavenie trvalo vyše 6 hodín.
         TD Bralen v tomto záverečnom show uviedlo "Ebony concerto" v choreogra i P.
    Šmoka. Touto tanečnou "odrobinkou" v tak rozsiahlom programe TD Bralen zaujalo
    manažéra, ktorý doporučil súbor majiteľovi hotelového komplexu Porto Hydra Village v
    Grécku. Tak sa TD Bralen otvorila možnosť ďalšieho zájazdu, v tomto prípade do
    atraktívneho, horúceho Grécka.

                Zoznam účastníkov zájazdu:

                     Letenaj Rastislav              Hrozienčik Peter
                     Kekeňáková Jana                Moravčíková Ivana
                     Štefanová Denisa               Šimková Ľubica
                    Marcinčinová Katarína          Bučková Janet
                    Dohanyos Michal                Steinhübel Ján
                    Hricka Vladimír                RemenárPeter
                    Beran Danko
