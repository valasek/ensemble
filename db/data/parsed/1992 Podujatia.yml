  date_to: '1992-09-24'
  raw_header: Zájazd TD Bralen do Anglicka a Škótska
  name: Zájazd TD Bralen do Anglicka a Škótska
  location:
  description: |-
    V tomto termíne sa štyria členovia TD Bralen (R. Letenaj, K.
    Vlniešková, J. Kekeňáková a D. Bolerázsky) zúčastnili tanečného festivalu vo Veľkej
    Británii, presnejšie v škótskom Borders.
           Naša návšteva sa uskutočnila na pozvanie organizátorov festivalu, medzi ktorými
    bola aj Kedzie Pen eld, americká pedagogička a choreografka žijúca v Škótsku.
           V samotnom festivalovom programe sme uviedli novšie choreogra e z nášho
    repertoáru: “Tracy”, “Prvá”, i choreogra e staršieho dáta ako napr. “Largo”, ktoré diváci
    prijali s mimoriadne veľkým ohlasom. Festivalový program bol pestrý a rôznorodý.
    Absolvovali sme tanečné semináre s hosťujúcimi pedagógmi, navštevovali sme
    predstavenia ostatných pozvaných súborov, sami sme sa zúčastnili "tanečného projektu",
    postaveného zvlášť pre festival.
           Cestu späť sme prerušili trojdňovou zastávkou v Londýne, v London Contemporary
    Dance School, kde sme mali vzácnu možnosť absolvovať tréningy a pozrieť sa aj na
    nácvik London Contemporary Dance Theatre s Robertom Cohanom (prvým umeleckým
    riaditeľom školy a bývalým umeleckým vedúcim divadla), čo bol určite najsilnejší zážitok
    tohto zájazdu.
- date_from: '1992-10-02'
  date_to: '1992-10-14'
  raw_header: Medzinárodný divadelný festival, Yokohama, Japonsko
  name: Medzinárodný divadelný festival, Yokohama
  location: Japonsko
  description: |-
    TD Bralen dostalo príležitosť stať sa vyslancom slovenskej divadelnej
    kultúry na východnej strane našej zemegule. Kontakty nadviazané s japonskými
    teatrológmi na "Scénickej žatve" v Martine v roku 1988, vyústili v pozvanie súboru na
    Kanagawský divadelný festival do japonskej Yokohamy.
          Festivalu sa zúčastnil celý rad divadelných súborov z Francúzska, Anglicka, U.S.A.,
    Nového Zélandu, Nemecka, Fínska, Ruska, Číny, Japonska... Každý súbor sa v rámci
    festivalu predstavil svojim celovečerným programom, po ktorom nasledovala vždy v
    hotelovom klube niekoľkohodinová rozborová diskusia. Musím priznať, že všetci s
    napätím očakávali náš program, pretože sme boli svojim tanečným zameraním jediný
    spomedzi zúčastnených, skôr činoherných divadelných súborov. Predstavenie TD Bralen
    bolo ohodnotené ako jedno z najúspešnejších. Organizátori festivalu a tiež účinkujúce
    súbory vyjadrili úprimné slová obdivu k profesionalite súboru.
    Harmonogram:
