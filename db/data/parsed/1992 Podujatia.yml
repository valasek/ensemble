  raw_header: VIII. Celoslovenský festival moderného tanca v DK Ovsište,
  name: VIII. Celoslovenský festival moderného tanca v DK Ovsište,
  location:
  description: |-
    Bratislava.
    Tohtoročnému festivalu predchádzalo mestské kolo, ktoré však nebolo súťažné, ale
    výberové. To znamená, že išlo o zaručenie kvality súborov, ktoré vystúpia na festivale, nie
    udelením diplomov a určením poradia, ale výberom a odborným seminárom.
         Na Celoslovenskom festivale sa predstavilo 6 kolektívov, ako hostia vystúpili,
    anglická skupina Ricochet Dance Company a Taneční učiliště UK z Prahy.
         Podujatie ukázalo, že umelecká a tvorivá úroveň vystúpení neklesla, hoci situácia,
    ktorá nastala v posledných dvoch rokoch v celej oblasti ZUČ, naznačovala opak. Mnohé
    súbory sa dostali z krízy najmä v súvislosti s novými možnosťami nančného
    zabezpečenia, niektoré súbory naopak stratou opory u svojich zriaďovateľov zanikli.
         Odborná komisia v zložení: doc. Dagmar Hubová (HaTF VŠMU), Helena Žitňanová
    (HaTF VŠMU), Alexander Móži (HaTF VŠMU), Vladimir Vašut (PKB Pavla Šmoka), Ján
    Hartmann (Praha), Peter Hrozienčik (Bratislava), M. Halászová (AMU Praha), Rochell-Zide
    Booth (hosťujúca pedagogička a choreografka z U.S.A.), sa tiež zhodla v tom, že úroveň
    súborov moderného scénického tanca rastie.
         "Na seminári sa robil dôkladný rozbor predvedeného čísla", hovorí Oľga Letenajová,
    organizátorka festivalu: "komisia sa usilovala vystríhať akéhokoľvek nadhodnocovania,
    vyzdvihovania jedného súboru nad iným. Tvorcovia diel, choreogra skôr prijmú kritiku, ak
    sa neviaže na následné odovzdávanie cien a diplomov. Všetci tu boli rovnocenní,
    diskutovalo sa v príjemnej, pokojnej atmosfére. Niektoré názory sa zhodli, iné sa naopak
    rozchádzali. Veľkým prínosom bolo azda to, že sa na podujatí vytvoril demokratický
    názorový priestor s možnosťami porovnávať, slobodne rozmýšľať."

          Ďalšou výraznou zložkou festivalu boli praktické semináre, na ktorých dostali
    priestor ľudia, ktorých práca je pre našich tanečníkov i choreografov mimoriadne vzácna.
    Boli to členovia Ricochet Dance company a Bill Young, tanečník, choreograf, toho času
    pôsobiaci na HaTK VŠMU v Bratislave.

         TD Bralen uviedlo choreogra u “Žít je strácet, znovu mít” s novými interpretmi, tanec
    “Prvá” a najnovšiu choreogra u “Ave Mária”.

