  raw_header: Celosúborová schôdza - rozpustenie Bralenu
  name: Celosúborová schôdza - rozpustenie Bralenu
  location:
  description: |-
    Po návrate z Japonska bola situácia Bralenu veľmi zlá. Stratil to
    najdôležitejšie, čo ku svojej existencii potrebuje. Zničená, zapáchajúca sála so zhnitými,
    vydutými parketami a navlhnutými stenami bol šok, pri ktorom sa bolo treba zo začiatku
    hlavne "zhlboka nadýchnuť”, (prepadnutie stropu na budove Apollo klubu Slovnaft).
          V tomto období vyvrcholila i jeho vnútorná kríza natoľko, že vedenie TD Bralen sa
    rozhodlo pre radikálne riešenie, a to rozpustenie súboru.
          Na celosúborovej schôdzi TD Bralen Rastislav Letenaj vysvetlil situáciu a príčiny
    svojho postupu.
          Jedným z hlavných dôvodov boli meniace sa ekonomické, hospodárske a politické
    podmienky, ktoré sa súboru veľkou mierou dokýkali. Členovia súboru, ktorí budú pôsobiť
    v Bralene v budúcnosti sa budú musieť podriadiť novému štatútu a organizačnému
    poriadku, ktorý nie každému bude vyhovovať. Ďalším závažným dôvodom bola
    nespokojnosť časti interpretov s vedením súboru. Ku každému cieľu existuje totiž
    niekoľko ciest, možností, avšak pre správny chod súboru je dôležité dohodnúť sa na
    jednej z nich a tú rešpektovať. Niektorí interpreti v súbore stratili dôveru v správnosť tej
    cesty, ktorú uprednostnilo vedenie.
          Dátum 21.10. 1992 ostane zapísaný v histórii ako koniec jednej veľkej kapitoly, ale
    zároveň začiatok novej éry TD Bralen. Každý jeho bývalý člen mal možnosť pokračovať v
    práci aj naďalej s tým rozdielom, že sa jedná o TD Bralen na iných právnych základoch.
    Niektorí tanečníci túto možnosť využili a vrátili sa späť, niektorí odišli... TD Bralen začalo
    svoju činnosť v tanečnej sále DK Ovsište, ktorý mu vyšiel v ústrety a tak mu pomohol
    prežiť v tejto jeho ťažkej situácii. Po dlhých rokovaniach s vedením a.s. Slovnaft sa
    podarila podpísať zmluva medzi a.s. Slovnaft a TD Bralen.
