- date_from: '2015-10-25'
  date_to:
  raw_header: Sústredenie, AKS
  name: Sústredenie
  location: AKS
  description: |-
    Víkendové sústredenie zamerané na pokračovanie v 3.a 4. časti
         choreogra e Mesto a rozhovor R. Letenaja s redaktorkou Sandrou Polovkovou do novej
         knihy k 40-tke Bralenu.
                 Od tohto mesiaca až do januára sme dali robiť rozcvičky K. Čaplovej v rámci
         príprav na prijímacie pohovory na VŠMU. Robila ich z Limóna, Hortona, jazzu a baletu a
         vždy sme si ich aj spripomienkovali. Ešte sme cez Helenu Žitňanovú vybavili pre Kristínu
         aj A. Vrbičanovú doučovanie z ľudového tanca. Sú to individuálne hodiny tu v Bralene a
         vedie ich pedagogička VŠMU a tanečnica z Lúčnice Kristína Šedivá.
         Aďa Vrbičanová sa stala novým pedagógom Bralenu a učila od septembra do decembra
         Limóna v TD Bralen. Absolvovala kurzy na Tanzwochen vo Viedni a tak sme jej dali
         príležitosť. Uchopila sa jej celkom dobre.
