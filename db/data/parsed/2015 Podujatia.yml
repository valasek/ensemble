  ROK 2015
                                      (40. rok existencie)

  Najdôležitejšie podujatia tohto roku:

  31.1. 2015           Skype skúška s J. Alegadom, AKS
                       prvá skúška s Joeom cez Skype (Joe bol v Texase a my v Bralene),
  kde čistil Moje sestry. Asi po hodine ju prerušil, lebo musel súrne niekam ísť. Dohodli sme
  ďalší termín

  1.3. 2015           40. rokov TD Bralen, Stavovské divadlo, Praha, ČR
                      Slávnostný program Bralenu a Bohemia baletu k 40. výročiu Bralenu.
  Bralen uviedol: “Moje sestry” - premiéra, “To je moja stolička”, “Karant”, “Tres canciones”,
  Cesta je nádej”

  5.6. 2015        Predstavenie Maximvs, H divadlo, Brno, ČR
                   J&R Letenaj sa boli pozrieť na poslednom predstavení Maximvs-u v
  brnenskom Ha divadle, ktorým D. Strnad ukončil činnosť tohoto súboru. Škoda

  5.7. 2015             Bosé nohy, DPOH, Bratislava
                        vystúpenie Bralenu s tancom “Tres canciones”. Bol to program,
  ktorý organizovala Dagmar Toporcerová. Vystupovali tam rôzni tanečníci z detských
  domovov, postihnutí, amenco tanečníci. Práve v tento deň mal Bralen 40. rokov tak
  braleňáci kúpili tortu a šampanské (detské) a pripomenuli sme si toto výročie.

  4.-13.9. 2015      Dovolenka braleňákov, Rovinj, Chorvársko
                     Braleňácka dovolenka k 40-tke. (Letenaj, Letenajová, Zaťková a
  Majtaník, Šeďová, Čaplová, Hostačná, Vrbičanová a Duras)

  3.10. 2015          Slávnostný program 40 rokov TD Bralen, DK ZH, Bratislava
                      Program: “Otec Smútok”, “Tres canciones”, “To je moja stolička”,
  “Moje sestry”, “Karant”, “Cesta je nádej”. R. Letenaj konferoval a po predstavení bol raut
  vo vestibule DK.




