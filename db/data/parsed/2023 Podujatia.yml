- date_from: '2023-11-17'
  date_to: '2023-11-19'
  raw_header: Sústredenie, AKS
  name: Sústredenie
  location: AKS
  description: |-
    Piatok 17.11. sme venovali čisteniu choreogra e "Tres Canciones,”
         Letenajovci čistili sólo "Dime."

         V sobotu sme pokračovali s B. Šoganovou k jej záverečnej práci na JAMU. Nedeľu sme
         venovali nácviku choreogra í na Dance Life Expo a VMT.

         Pre chorobu vypadla V. Blahová, ktorá chýbala aj ďalší týždeň - bola potrebná zmena
         obsadení a nácvik choreogra í v nových obsadeniach na blížiace sa vystúpenia.
- date_from: '2023-11-25'
  date_to:
  raw_header: Vystúpenie, Festival Dance Life Expo, Brno, ČR
  name: Vystúpenie, Festival Dance Life Expo, Brno
  location: ČR
  description: |-
    Po niekoľkých rokoch sme opäť boli súčasťou festialu Dance Life
         Expo. Formát festivalu sa medzičasom zmenil a boli sme obmedzení na cca 10 minút
         tancov, z ktorých si organizátori vybrali tretie časti "Tres Canciones" a "Basso Continuo."
         Na zájazd sme išli dvoma autami, ktoré šoférovali S. Zajícová a H. Lazíková.

         "Tres Canciones" - 3. časť: V. Karazei, H. Lazíková, T. Piatriková, S. Zajícová, T. Duras,
         vypomohla tiež K. Milučká (v tom čase vedená v prípravke)
         "Basso Continuo" - 3. časť: V. Karazei, H. Lazíková, E. McKillop, S. Zajícová, T. Duras, R.
         Šestina
- date_from: '2023-11-26'
  date_to:
  raw_header: Vystúpenie, VMT - ZUŠ J. Kresánka, DK Dúbravka, Bratislava
  name: Vystúpenie, VMT - ZUŠ J. Kresánka, DK Dúbravka
  location: Bratislava
  description: |-
    TD Bralen vystúpil ako hosť výročného programu k oslavám 55 rokov
         od založenia ZUŠ J. Kresánka. Z tejto ZUŠ prišlo do Bralenu viacero tanečníc, vrátane S.
         Zajícovej, ktorá na škole aktuálne pôsobí aj ako pedagóg a zoznamuje žiakov s našou
         činnosťou. Toto vystúpenie by mohlo byť základom pre ďalšiu spoluprácu.

         V programe VMT boli tiež 3 choreogra e od S. Zajícovej: "Enemy," "Love Yourself" a "All
         My Tears Have Been Used Up," sólo, ktoré ako hosť večera tancovala už členka prípravky
         TDB, E. Jursová.

         Vystúpenie dopadlo napriek komplikáciám s chorobnosťou veľmi pozitívne.

         Za TDB tancovali:
         "To je moja stolička" - H. Lazíková, S. Zajícová, T. Duras
         "Basso Continuo" - V. Karazei, H. Lazíková, T. Piatriková, S. Zajícová, T. Duras, R.
         Šestina
         "Tres Canciones" - S. Zajícová (solo), H. Lazíková a T. Duras (duet), V. Karazei, M.
         Mikšová, T. Piatriková

