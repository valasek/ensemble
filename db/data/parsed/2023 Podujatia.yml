- date_from: '2023-01-05'
  date_to: '2023-01-08'
  raw_header: Sústredenie súboru, AKS
  name: Sústredenie súboru
  location: AKS
  description: |-
    Rok sme začali predĺženým sústredením, ku ktorému sme prizvali
         bývalú braleňáčku Barboru Šoganovú. V súčasnej dobe dokončuje štúdium fyzického
         divadla na JAMU v Brne. Začala s nami s cvičeniami na aktívne využívanie centra, prácu s
         podlahou, vnímanie a prácu s priestorom, vnímanie a prácu s partnerom a skupinou,
         kinestetické vnímanie, využitie improvizácie, rytmiky a dynamiky v pohybe, autenticitu
         prejavu, asociačné myslenie, rozvoj sebadôvery. V pláne sú pravidelné stretnutia formou
         mesačných sústredení na najbližšieho pol roka, počas ktorého by mala vznikať
         choreogra a, ktorá by bola prezentovaná ako záverečná práca jej štúdia na JAMU.
         T. Duras a K. Milučká sa januárového sústredenia nezúčastnili pre chorobu, súbor
         nacvičoval bez nich.
