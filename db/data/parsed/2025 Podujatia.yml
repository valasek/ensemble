    strámke to bol nie stratový, ale slabý týždeň. Nepríjemná bola aj nespokojnosť B.
    Lanczovej s výškou honoráru.
- date_from: '2025-07-05'
  date_to:
  raw_header: Brigáda, AKS
  name: Brigáda
  location: AKS
  description: |-
    V sobotu po letnej škole sme spolu s ostatnými braleňákmi
    vyprázdnili naše priestory a pripravili ich na renováciu. V pláne je výmena svetiel vo
    všetkých miestnostiach okrem tanečnej sály, výmena dverí, výmena podlahy na chodbe
    (dlažba) a plávajúca podlaha do miestností pri tanečnej sále a na malej sále. Súčasťou je
    tiež komplet vymaľovanie priestorov (po zatečení v 2024 boli len na oko premaľované
    fľaky, ktoré presvitajú). Od Slovnaftu sme na obdobie prerábky dostali zapožičané
    priestory kancelárie pri vstupných dverách do našich priestorov.
    Z braleňákov prišli na brigádu vypomôcť: M. Brisudová, S. Osvaldová, Z. Osvaldová, M.
    Klačeková, H. Lazíková, K. Milučká, A. Perfecká, T. Piatriková, R. Šestina.
- date_from: '2025-07-07'
  date_to: '2025-07-27'
  raw_header: Renovácia priestorov, AKS
  name: Renovácia priestorov
  location: AKS
  description: |-
    Okrem plánovaných prác bolo dohodnuté vyhladenie sokla na chodbe a zasekanie
    elektrických rozvodov. Mimo plánu bola tiež vykonaná čiastočná nihelácia podlahy na
    malej sále. Prebehla tiež výmena podláh, svietidiel a maľovka ako bolo v pláne. Pre
    neplánované zmeny sa však do rozpočtu nezmestila výmena dverí. Počas prerábky sa u
    nás vystriedali štyri odlišné tímy pracovníkov: elektrikári, maliari a podlahári (od Slovnaftu)
    a pokladači plávajúcej podlahy (kontraktor).
