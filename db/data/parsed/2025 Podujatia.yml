- date_from: '2025-05-02'
  date_to:
  raw_header: Konkurz, AKS
  name: Konkurz
  location: AKS
  description: |-
    Konkurzu sa zúčastnilo spolu až 17 záujemcov vo veku 10-24
         rokov. Je to po viacerých rokoch významnejšia účasť. Na propagácii konkurzu sa
         významne podieľala S. Osvaldová. Dve dievčatá z konkurzu sme chceli vziať do súboru
         s nástupom ihneď, čo sa nám však nepodarilo úspešne zladiť. V dvoch mesiacoch po
         konkurze začalo na tréning chodiť napokon len 6 z účastníkov tohto konkurzu. S
         ďalšími 6 sme sa dohodli na nástupe až od novej sezóny (9/ 2025). Na konkurz tiež
         prišlo viacero detí (8 záujemcov 10-14 rokov), ktoré by mali tvoriť základ pre novú
         detskú prípravnú skupinu od novej sezóny.
