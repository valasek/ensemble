- date_from: '2025-06-30'
  date_to: '2025-07-04'
  raw_header: Letná škola, AKS
  name: Letná škola
  location: AKS
  description: |-
    Prvý termín letnej školy: Klasický tanec I/II a Horton I (T. Duras),
    Contemporary a Hravá improvizácia (M. Stašková), Limón I a Jazz I/II (B. Lanczová), Fyzio
