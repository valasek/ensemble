       podporu celoročných aktivít s názvom "Celoročné aktivity Tanečného divadla Bralen" -
       projekt získal podporu vo výške 1350€.

       15.6. 2025        Večer Moderného Tanca, ZUŠ J. Kresánka, DK Dúbravka
                         TD Bralen vystúpil ako hosť na VMT ZUŠ J. Kresánka pod vedením
       H. Kopeckej. Na VMT sme prezentovali choreogra e "Basso Continuo" (R.
       Lampartová), "Karant" (D. Strnad) a "Cesta je nádej, nádej je cesta." (J. Letenajová).

       7.-27.7. 2025       Renovácia priestorov, AKS

       13.9. 2025          Tanečné divadlo Bralen - 50 rokov, DPOH, Bratislava
                           Večerný galaprogram k 50. výročiu TD Bralen

       29.11. 2025         Vystúpenie, DanceLife! Expo, Brno

       18.12. 2025       Schôdza súboru, AKS
