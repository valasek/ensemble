- date_from: '2025-06-15'
  date_to:
  raw_header: Večer Moderného Tanca, ZUŠ J. Kresánka, DK Dúbravka
  name: Večer Moderného Tanca, ZUŠ J. Kresánka
  location: DK Dúbravka
  description: |-
    TD Bralen vystúpil ako hosť na VMT ZUŠ J. Kresánka pod vedením
         H. Kopeckej. Na VMT sme prezentovali choreogra e "Basso Continuo" (R.
         Lampartová), "Karant" (D. Strnad) a "Cesta je nádej, nádej je cesta." (J. Letenajová).
         V programe tancovali: M. Borovská, T. Duras, E. Jursová, H. Lazíková, V.
         Mühlbergerová, S. Osvaldová, T. Piatriková, R. Šestina, S. Zajícová.
         Priestorovú skúšku viedol T. Duras, s asistenciou K. Milučkej. Svetelnú réžiu
         zabezpečila M. Šeďová.

    Večerný program prišiel neplánovane zdokumentovať aj P. Brenkus. Opakovane sa
    ukazuje, že DK Dúbravka nie je veľmi vhodný čo sa technického zázemia týka. Viaceré
    kľúčové svetlá (prievany, diagonály) neboli nastavované aj pre bezpečnostné obavy o
    deti zo ZUŠ.
