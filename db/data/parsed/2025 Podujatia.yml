  ROK 2025
                                           (50. rok existencie)

       Najdôležitejšie podujatia tohto roku:

       1.3. 2025             Vystúpenie TD Bralen, Malá scéna, Zlín
                             TD Bralen vystúpil ako hosť tanečnej skupiny Dancing People pod
       vedením H. Tomáškovej. Na "podVečeri Moderního Tanca" sme prezentovali
