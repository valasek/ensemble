  date_to: '2025-08-08'
  raw_header: Brigáda po renovácii, AKS
  name: Brigáda po renovácii
  location: AKS
  description: |-
    M. Šeďová a T. Duras pripravili priestory na opätovné fungovanie.
         Súčasťou príprav bolo aj pretretie zárubní novou vrstvou. Prípravy prebehli včas, aj keď sa
         oneskorili pre nedokončené práce - elektrikári nám nenamontovali nové vypínače a
         zásuvky. Na brigáde prispeli pomocnou rukou aj: M. Brisudová, E. Hrubočáková, M.
         Klačeková, A. Perfecká, T. Piatriková, S. Zajícová
- date_from: '2025-08-11'
  date_to: '2025-08-15'
  raw_header: Letná škola tanca, AKS
  name: Letná škola tanca
  location: AKS
  description: |-
    Druhý termín letnej školy - ten bol posunutý kvôli Danceana Campu,
         ktorý tento rok prebiehal v štandardnom termíne augustových letných škôl. Prebiehali
         tieto lekcie: Fyzio cvičenia (J. Letenajová), Klasický tanec I/II a Variácie (T. Duras), Limón I/
         II a Modern jazz II (B. Lanczová), Horton II a Rytmika (M. Motlochová). Tohoto týždňa sa
         zúčastnilo 35 mimo súborových a 15 členov Bralenu. Finančne dopadol tento týždeň
         násobne lepšie ako prvý týždeň LŠT.
- date_from: '2025-08-15'
  date_to:
  raw_header: Predaj vstupeniek, DPOH
  name: Predaj vstupeniek
  location: DPOH
  description: |-
    Len dva dni po tom, ako DPOH spustilo predaj vstupeniek (13.8.) k
         výročiu nám predaj bez oznámenia zastavili. Dôvodom bolo, že vedenie DPOH trvalo na
         tom, aby sme najprv podpísali dodatok k zmluve o zastrešení predaja vstupeniek, ktoré
         nebolo dohodnuté k podpisu zmluvy. Riešenie z ich strany bolo veľmi neštandardné.
         Predaj vstupeniek opäť pokračoval po podpise dodatku zmluvy o týždeň neskôr (20.8.).
- date_from: '2025-08-16'
  date_to:
  raw_header: Konkurz, AKS
  name: Konkurz
  location: AKS
  description: |-
    Skúšali sme zaradiť nový termín konkurzu na stred leta po letnej
         škole, nie však veľmi úspešne. Na termín sa prihlásili dve tanečnice - jedna (N. Sujová)
         prišla na sálu a bola prijatá do súboru (v septembri ale nenastúpila pre školské vyťaženie
         na VŠMU) a druhá prišla po dohode na druhý augustový termín konkurzu (D. Hlavnová,
         od októbra nastúpila do prípravky).
- date_from: '2025-08-17'
  date_to: '2025-08-23'
  raw_header: 2. roč. Prázdninového setkání s tancem, Tramtáryje, Horní Jelení
  name: 2. roč. Prázdninového setkání s tancem, Tramtáryje
  location: Horní Jelení
  description: |-
    T. Duras učil lekcie Hortona a Jazz I, Jazz II, R. Letenaj zabezpečil
         fotodokumentáciu. Z účastníkov na letnej škole tancovali len dvaja braleňáci M. Šeďová a
         T. Piatriková.
- date_from: '2025-08-24'
  date_to: '2025-08-28'
  raw_header: Sústredenie, AKS
  name: Sústredenie
  location: AKS
  description: |-
    S braleňákmi zo súboru sme sa tento rok stretli o týždeň skôr -
         posledný prázdninový týždeň sme zorganizovali sústredenie k prípravám na 50. výročie
         TD Bralen. Plánované tance boli rozdelené tak, aby sme zastrešili nácvik aj s prizvanými
         autormi choreogra í: J. Letenajová, R. Letenaj a J. Alegado.
         Sústredenia sa okrem aktuálnych členov súboru zúčastnili aj V. Blahová (bývalá členka
         súboru) a K. Mitríková (členka prípravky). Pred začiatkom leta R. Letenaj vyjadril nádej, že
         by jeho choreogra a "Otec Smútok, matka Nádej" bola na výročí obsadená deviatimi
         tanečnicami. V. Blahová, ktorá mala predošlú skúsenosť s tancovaním sóla v tejto
         choreogra i, sa dočasne opäť pridala k súboru, aby toto sólo nacvičila a tancovala. Pre
         zvýšenie šancí na obsadenie 9 tanečníc sa choreogra u naučila aj K. Mitríková, aj keď ju
         na výročí napokon netancovala. K súboru sa však na výročí pridala aspoň na 4. časť
         choreogra e "Cesta je nádej, nádej je cesta," ktorú sa na tomto sústredení naučila.
         Pondelok sme venovali spoločnému osvieženiu choreogra e "Otec Smútok, matka
         Nádej", ktorú v utorok prišiel prečistiť R. Letenaj. V stredu sme sa venovali čisteniu
         tancov "Karant" s R. Letenajom a "Cesta je nádej, nádej je cesta" s J. Letenajovou. Na
         štvrtok a piatok prišiel J. Alegado na záverečné prečistenie jeho novej choreogra e
         "South / Let na juh". Ostatné plánované tance sme si počas tohto týždňa aspoň osviežili
         a prečistili na ďalších repertoárových nácvikoch.
- date_from: '2025-08-29'
  date_to:
  raw_header: Konkurz, AKS
  name: Konkurz
  location: AKS
  description: |-
    Konkurzu sa zúčastnilo 5 tanečníc, z ktorých sme jednu (K.
         Polkorábová) prijali do súboru. Neskôr však po niekoľkých repertoároch prerušila
         fungovanie pre zdravotné komplikácie. Ostatné štyri nastúpili do prípravky.
- date_from: '2025-09-01'
  date_to:
  raw_header: Začiatok sezóny, AKS
  name: Začiatok sezóny
  location: AKS
  description: |-
    Prvým tréningom sezóny bol uzatvorený tréning pre detskú prípravku
         (viedol T. Duras), otvorený tréning Limóna pre verejnosť (viedla. B. Lanczová) a
         repertoárový tréning súboru (viedla M. Šeďová). Vzhľadom na blížiace sa výročie táto
         sezóna vôbec nepôsobí, ako nový začiatok, skôr je cítiť, akoby to bolo plynulé
         pokračovanie sezóny predošlej.
- date_from: '2025-09-06'
  date_to: '2025-09-07'
  raw_header: Sústredenie, AKS
  name: Sústredenie
  location: AKS
  description: |-
    Záverečné sústredenie, kostýmová skúška a zbehávka repertoáru
         plánovaného na výročie.
- date_from: '2025-09-13'
  date_to:
  raw_header: Tanečné divadlo Bralen - 50 rokov, DPOH, Bratislava
  name: Tanečné divadlo Bralen - 50 rokov, DPOH
  location: Bratislava
  description: |-
    Večerný galaprogram k 50. výročiu TD Bralen:

               1. Tanec siedmych sestier (T. Duras)
               2. Basso Continuo (R. Lampartová)
               3. Karant (D. Strnad)
               4. Otec Smútok, matka Nádej (R. Letenaj)
               5. Let na juh (J. Alegado)
               6. Cesta je nádej, nádej je cesta (J. Letenajová)

         V programe tancovali:
         V. Blahová, M. Borovská, M. Brisudová, T. Duras, H. Lazíková, K. Mitríková, V.
         Mühlbergerová, S. Osvaldová, A. Perfecká, T. Piatriková, R. Šestina, S. Zajícová

         Konferans programu: R. Letenaj
         Svetelný technik: M. Šeďová
         Foto-dokumentácia: P. Brenkus
         Video-záznam: T. Duras

         Predalo sa spolu 276 vstupeniek, medzi divákmi bolo početné zastúpenie bývalých
         braleňákov a fanúšikov všetkých generácií, vrátane našich zakladajúcich členov (K.
         Horváthová, P. Hrozienčík, O. Letenajová, D. Puobišová). Galavečer bol veľmi príjemným
    oslávením 50 rokov existencie Bralenu s emotívnym vyústením, pri ktorom R. Letenaj
    symbolicky odovzdal kľúče od kancelárie T. Durasovi. Oslavný večer pokračoval
    gratuláciami, zdieľaním dojmov a spomienok, ako aj spoločnou fotogra ou aktuálnych a
    predošlých braleňákov na raute na poschodí DPOH.
- date_from: '2025-09-27'
  date_to:
  raw_header: Konkurz, AKS
  name: Konkurz
  location: AKS
  description: |-
    Konkurzu sa zúčastnilo 6 dievčat, z ktorých dve (K. Ramazanova, H.
    Balážová) sme prijali do súboru. Z ostatných štyroch prijatých do prípravky nastúpila iba
    jedna (N. Medzihradská). V priebehu septembra sme tiež rozbiehali detskú skupinu, z
    náboru sa zo 4 dievčat udržala iba jedna.
- date_from: '2025-09-27'
  date_to:
  raw_header: Brigáda, AKS
  name: Brigáda
  location: AKS
  description: |-
    Miestnosť, ktorú sme mali od Slovnaftu zapožičanú na obdobie
    renovácií, sme mali predĺženú do konca septembra. Na poslednú sobotu sme dohodli
    brigádu, počas ktorej sme nasťahovali dočasne umiestnené skrine a ostatné predmety
    späť do našich dlhodobých priestorov v budove. Z braleňákov prišli vypomôcť: M.
    Klačeková, S. Osvaldová, T. Piatriková, M. Šeďová, R. Šestina, T. Duras.
- date_from: '2025-09-29'
  date_to:
  raw_header: Výmena pedagóga, AKS
  name: Výmena pedagóga
  location: AKS
  description: |-
    B. Lanczová učí posledného Limóna v priestoroch TD Bralen. Od
    októbra spúšťa vlastné štúdio Danceana. O plánoch otvárať vlastné štúdio sa s T.
    Durasom priebežne bavili od mája, ale po viacerých odkladoch a neistotách sa de nitívu
    dozvedel od tanečníkov, ktorí sa prišli do kancelárie pýtať ako budú prebiehať tréningy,
    keď "budúci pondelok" je posledný tréning s Bibou. Od 13.10. v študiu po niekoľkých
    rokoch opäť učí R. Lampartová.
- date_from: '2025-10-11'
  date_to:
  raw_header: Sústredenie a hry, AKS
  name: Sústredenie a hry
  location: AKS
  description: |-
    Individuálne sústredenie, na ktorom M. Šeďová učila záujemkyne sólo
    "Dime" z choreogra e "Tres Canciones." Poobedná časť dňa pokračovala spoločenskými
    hrami, zúčastnili sa: V. Mühlbergerová, S. Osvaldová, A. Perfecká, T. Piatriková, M.
    Šeďová.
- date_from: '2025-10-19'
  date_to:
  raw_header: Workshop M. Graham, Momentum Dance Team (Mliekarenska 10)
  name: Workshop M. Graham
  location: Momentum Dance Team (Mliekarenska 10)
  description: |-
    D. Beňáková nás informovala o možnosti pridať sa na workshop
    techniky a repertoáru M. Graham pod vedením Miki Orihara, bývalou sólistkou Graham
    Company. Za TDB sa zúčastnili: M. Borovská, V. Mühlbergerová, S. Osvaldová, A.
    Perfecká, T. Piatriková, S. Zajícová.
- date_from: '2025-11-08'
  date_to: '2025-11-09'
  raw_header: Sústredenie, AKS
  name: Sústredenie
  location: AKS
  description: |-
    Na sústredenie bola prizvaná jedna zo zakladajúcich členiek TD
    Bralen, D. Puobišová, ktorá si pre súbor pripravila sériu cvičení zameraných na rozvoj
    výrazového cítenia a pantomímy. Okrem workshopu sme sa tiež venovali duetu z "Tres
    Canciones" - choreogra u, ktorú sme týmto skompletizovali a môžeme s ňou znovu
    uvažovať v repertoári.
- date_from: '2025-11-29'
  date_to:
  raw_header: Vystúpenie, DanceLife! Expo, Brno
  name: Vystúpenie, DanceLife! Expo
  location: Brno
  description: |-
    Vystúpili sme v programe festivalu DanceLife! Expo v Brne - tancovali
         sme choreogra u “Cesta je nádej, nádej je cesta." Prípravy trochu narušila choroba A.
         Perfeckej - ale dievčatá (najmä S. Osvaldová, M. Borovská a K. Ramazanova) zabrali,
         doučili sa rýchlo aj iné miesta a boli sme pripravení na dve alternatívy. Naponok sme šli
         pôvodnú verziu s A. Perfeckou a premiérou K. Ramazanovej v štvrtej časti. Okrem toho sa
         niektorí členovia (T. Duras, T. Piatriková, S. Zajícová) zúčastnili aj tanečných workshopov.
                Čo sa vystúpení týka, festival žiaľ upadá na kvalite. V tomto ročníku boli 3 show-
         artové bloky po cca 60 minútach pre ZUŠ a iné kluby, ich prevažnú väčšinu tvorili hip-
         hopové súbory. My sme vystúpili v prvom bloku. Po týchto nasledovalo Gala, kde
         vystúpili súbory profesionálnych divadiel a české konzervatóriá. S výnimkou jedného
         súboru však vyslali samé duety, čo bolo slabé aj po dramaturgickej stránke. Divácka
         pozornosť bola roztrieštená naprieč štyroch programov a preto mali všetky veľmi nízku
         návštevnosť, vrátane Gala, ktoré videlo odhadom cca 50 divákov.
- date_from: '2025-12-06'
  date_to: '2025-12-07'
  raw_header: Sústredenie, AKS
  name: Sústredenie
  location: AKS
  description: |-
    Prebehlo sústredenie súboru, kde sme sa venovali rozšíreniu
         choreogra e "Tanec siedmych sestier”. Rozcvičku viedla S. Zajícová, ktorá
         sprostredkovala skúsenosti z workshopu latin fusion z DanceLife! festivalu.
- date_from: '2025-12-18'
  date_to:
  raw_header: Schôdza súboru, AKS
  name: Schôdza súboru
  location: AKS
  description: |-
    Posledný tréning v roku bola klasika s T. Durasom a po nej
         nasledovalo posedenie pod jedličkou, vrámci ktorého sme tiež zvolali Schôdzu súboru.
         Schôdzu otvoril R. Letenaj, ktorý infomoval členov, že sa ku koncu roka 2025 vzdáva
         svojej funkcie a navrhol za kandidáta na riaditeľa TD Bralen aktuálneho umeleckého šéfa
         T. Durasa, ktorý bol nasledovným hlasovaním zvolený za nového riaditeľa na ďalšie
         obdobie. Hlasovanie pokračovalo odsúhlasením novej výšky členského
         vo výške 700€ na sezónu (70€ x 10 mesiacov). Za súbor sa dosluhujúcemu riaditeľovi
         poďakovala za dlhoročné vedenie V. Mühlbergerová s príhovorom, ktorý mal veľmi
         emotívny charakter. Večer pokračoval zábavou, ktorá ukončila rok 2025.
