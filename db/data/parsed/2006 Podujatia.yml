year: 2006
year_description: |-
  ROK 2006
                                        (31. rok existencie)

         Rok 2006 budem hodnotiť z dvoch hľadísk: ekonomické zázemie a umelecká
  činnosť.
         Ekonomické zázemie je charakterizované pre zmenu sponzorskej politiky
  jednotlivých sponzorov, alebo pre malú medializáciu činnosti súboru, alebo bez udania
  dôvodu, ukončením sponzorskej pomoci v prospech TD Bralen. Takto v roku 2005-6
  skončila spolupráca s:
               a.s. Slovnaft (29 rokov pozícia genrálneho sponzora)
               Tatra banka                       HT Computers
               Nextra                            Hotel Dukla
               Ministerstvo kultúry SR           ŠFK Proslovakia
               Tatra ABB                         Tlačiarne Banská Bystrica
               České aerolínie                   Vydavateľstvo IKAR

         Zmena postoja nášho bývalého generálneho sponzora a.s. Slovnaft sa prejavila
  nielen v nepodporení činnosti súboru načnou čiastkou, ale aj nutnosti platiť komerčné
  nájomné a spotrebovanú energie v priestoroch TD Bralen Slovnaftu.

         Z týchto faktov je jasné, že rok 2006 bol rokom, v ktorom sme všetku energiu
  venovali záchrane existencie TD Bralen. Snažili sme sa zabezpečiť peniaze najmä
  vlastnou aktivitou tj. komerčnými predstaveniami, letnými školami tanca, tanečnými
  hodinami pre verejnosť, členskými príspevkami a v neposlednej rade i vyhľadávaním
  darcov 2%.
                                         Podpora Slovnaftu pre TD Bralen
    1 400 000


    1 050 000


     700 000


     350 000


           0


     -350 000


     -700 000
                2000       2001          2002         2003           2004   2005   2006




        Umelecká činnosť: Spolupráca s VŠMU, ZUŠ, hodiny pre verejnosť, LŠT,
  predstavenia, premiéra “Nádej”, “Šéfová stolička”, “Kde si?”, školenia naších pedagógov,
  bonbóniky, VMT s TD Maximvs a jediné predstavenie v zahraničí v Brne TD Bralen + TD
  Maximvs




