  ROK 1982
                                          (7. rok existencie)

  Najdôležitejšie podujatia tohto roku:

  1.9. 1982            Rastislav Letenaj sa stáva organizačný vedúci súboru
                       V septemberi 1982 sa organizačným vedúcim stáva Rastislav
  Letenaj, ktorého príchod a pôsobenie znamenalo pre súbor značný vzostup a upevnenie
  jeho vnútomej štruktúry. Umeleckou vedúcou ostáva Oľga Letenajová, internými
  pedagógmi sú Oľga Letenajová, Rasťo Letenaj, Anka Nedbalová-Sedláčková, Marta
  Pálková-Poláková (ďalšie talentované interpretky a zároveň aj poslucháčky KTT HaTF
  VŠMU odbor pedagogika tanca). Externými choreografmi sú Helena Žitňanová, Ján
  Hartmann a Dagmar Puobišová.

  26.-30.11. 1982      Dielňa komorného tanca v NDR

  3.-5.12. 1982      III. Festival moderného scénického tanca v Banskej
                     Bystrici
  Bralen na tomto podujatí uviedol nové choreografie, "6 tancov pre autu" H. Žitňanovej,
  "Nenechávaj ma samote" a "Priateľstvá", obe v choreografii Zuzany Hájkovej.




