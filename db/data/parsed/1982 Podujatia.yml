  raw_header: Dielňa komorného tanca, Neubrandenburg, NDR
  name: Dielňa komorného tanca, Neubrandenburg
  location: NDR
  description: |-
    zorganizovaná v spolupráci OÚ v Bratislave a Zentralhaus fur
    Kulturarbeit v NDR. Bola kľúčovou akciou v tejto sezóne. Zúčastnila sa jej Oľga
                                                                                          3z4
         Letenajová, ako lektorka techniky Marthy Graham. Celá prehliadka sa zaoberala otázkou
         komorného tanca, jeho významom, predvedením na scéne a riešením súčasných
         problémov tanca. Jednotlivé tanečné ukážky súborov rozličných národností sa
         predvádzali najskôr na sále v cvičnom úbore, bez svetiel a efektov. Po skončení každého
         vystúpenia nasledovalo podrobné zhodnotenie a rozbor choreografíe. Všetci prítomní
         (účinkujúci, ostatní tanečníci iných súborov, odborníci, ale aj laici) sa mohli k jednotlivým
         vystúpeniam vyjadriť. Rozoberal sa nielen dej, celkový dojem, ale aj prínos súčasnému
         tanečnému umeniu, hudobný doprovod a výkony interpretov. V Kultúmom dome v
         Neubrandenburgu prebehol na záver podujatia tanečný galaprogram domácich súborov
         (Tanečný odbor Musik schule z Benshausenu, Tanečný súbor z Wolfenu, Magdeburgu,
         Tanečné divadlo J. Goeweho z Lipska a i.) a pozvaných hostí - tanečné skupiny z
         Maďarska, Bulharska a Poľska, ktoré predviedli väčšinou choreografie folklórneho
         zamerania. Prehliadka bola zorganizovaná na veľmi dobrej úrovni, hodnotná, čo sa týka
         širokej škály tanečných vystúpení, množstvom rôznych názorov, pripomienok, kritík a
         bohatá na počet divákov.

         Seminár techniky Marthy Graham, ktorý s prítomnými tanečníkmi viedla Oľga Letenajová,
         bol vysoko ocenený
