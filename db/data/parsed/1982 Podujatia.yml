         hudby Helene Žitňanovej a Zuzane Hájkovej, cena za interpretáciu Patrícii Samuhelovej a
         Jane Kekeňákovej a cena za návrh kostýmov pre choreografiu "6 tancov pre autu"
         Dagmar Hilbertovej. Za celkové účinkovanie a interpretáciu predvedených choreografií
         získal súbor Bralen hlavnú cenu festivalu.
