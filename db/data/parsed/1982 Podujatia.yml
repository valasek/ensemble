  raw_header: III. Festival moderného scénického tanca, Banská Bystrica
  name: III. Festival moderného scénického tanca
  location: Banská Bystrica
  description: |-
    Bralen na tomto podujatí uviedol nové choreografie, "6 tancov pre
          autu" H. Žitňanovej, "Nenechávaj ma samote" a "Priateľstvá", obe v choreografii Zuzany
